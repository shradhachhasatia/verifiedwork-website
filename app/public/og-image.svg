<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, 'DejaVu Sans', Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#D8F3DC" stop-opacity="0.9"/>
      <stop offset="68%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#FFFFFF"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand lockup -->
  <g transform="translate(80, 72)">
    <circle cx="17" cy="16" r="17" fill="#2D6A4F"/>
    <path d="M9.5 16.5 L14.5 21.5 L24 11" fill="none" stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="48" y="26" font-size="30" letter-spacing="-0.6"><tspan font-weight="700" fill="#1A1A1A">verified</tspan><tspan font-weight="400" fill="#6B7280">work</tspan></text>
  </g>

  <!-- eyebrow -->
  <text x="82" y="280" font-size="22" font-weight="600" letter-spacing="2.4" fill="#2D6A4F">INTENT-BASED HIRING</text>

  <!-- headline -->
  <text x="78" y="368" font-size="78" font-weight="800" letter-spacing="-3" fill="#1A1A1A"><tspan fill="#2D6A4F">Human</tspan> validation</text>
  <text x="78" y="456" font-size="78" font-weight="800" letter-spacing="-3" fill="#1A1A1A">in an AI world.</text>

  <!-- subline -->
  <text x="82" y="520" font-size="29" font-weight="400" fill="#6B7280">Hiring based on what you've done. Not what your CV says.</text>

  <!-- waitlist pill -->
  <g transform="translate(82, 552)">
    <rect width="236" height="48" rx="24" fill="#1A1A1A"/>
    <text x="118" y="31" font-size="19" font-weight="600" fill="#FFFFFF" text-anchor="middle">Join the waitlist</text>
  </g>

  <text x="1118" y="588" font-size="22" font-weight="500" fill="#9CA3AF" text-anchor="end">verifiedwork.co</text>
</svg>
