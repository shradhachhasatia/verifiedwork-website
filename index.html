<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>verified.work — Human validation in an AI world</title>
<link rel="icon" href="assets/logo-icon.svg" />
<meta name="ext-resource-dependency" content="assets/logo-icon.svg" data-resource-id="logoIcon" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --vw-green:#2D6A4F; --vw-green-2:#40916C; --vw-green-tint:#D8F3DC;
  --vw-green-deep:#1F4A37; --vw-green-ring:rgba(45,106,79,.22);
  --vw-black:#1A1A1A; --vw-white:#FFFFFF;
  --vw-grey:#6B7280; --vw-grey-2:#9CA3AF; --vw-grey-3:#4B5563;
  --vw-ink:#1A1A1A; --vw-ink-2:#374151; --vw-ink-3:#6B7280;
  --vw-surface-2:#F9FAFB; --vw-surface-3:#F3F4F6;
  --vw-line:#E5E7EB; --vw-line-strong:#D1D5DB; --vw-line-faint:#F3F4F6;
  --vw-warning:#B5800B; --vw-warning-tint:#FEF3C7;
  --vw-danger:#B91C1C; --vw-danger-tint:#FEE2E2;
  --vw-font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --vw-font-mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  font-family:var(--vw-font);
  background:#E9E9ED;
  color:var(--vw-ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
#root{min-height:100%;}

/* ---- Stage ---- */
.stage{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:22px;padding:40px 16px 56px;
}
.stage-cap{
  display:flex;align-items:center;gap:10px;
  font-family:var(--vw-font-mono);font-size:11px;letter-spacing:.06em;
  text-transform:uppercase;color:#8A8A93;
}
.stage-cap .dot{width:5px;height:5px;border-radius:50%;background:#B8B8BE;}
.stage-hint{
  font-size:12.5px;color:#8A8A93;max-width:380px;text-align:center;line-height:1.5;
}
.stage-hint b{color:#5C5C64;font-weight:600;}

/* ---- App canvas inside device ---- */
.vw-app{
  height:100%;background:var(--vw-white);
  display:flex;flex-direction:column;position:relative;
  font-family:var(--vw-font);color:var(--vw-ink);
}
.vw-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.vw-scroll::-webkit-scrollbar{width:0;height:0;}

/* screen padding presets (clear island/status bar + home indicator) */
.vw-pad{padding:64px 24px 40px;}

/* ---- Screen transition ---- */
.scr{animation:scr-in .22s cubic-bezier(.2,.7,.3,1) both;}
@keyframes scr-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes splashIcon{from{opacity:0;transform:scale(.72);}to{opacity:1;transform:scale(1);}}
@keyframes splashFade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.scr{animation:none;}}

/* ---- Wordmark ---- */
.wm{display:inline-flex;align-items:center;gap:.18em;letter-spacing:-.01em;line-height:1;}
.wm .v{font-weight:700;color:var(--vw-black);}
.wm .w{font-weight:400;color:var(--vw-grey);}

/* ---- Eyebrow / mono ---- */
.eyebrow{font-family:var(--vw-font);font-weight:500;font-size:11px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--vw-grey);}
.mono{font-family:var(--vw-font-mono);letter-spacing:.02em;}

/* ---- Progress dots ---- */
.prog{display:flex;align-items:center;gap:14px;}
.prog-dots{display:flex;gap:7px;}
.prog-dots i{width:8px;height:8px;border-radius:50%;background:var(--vw-line-strong);
  transition:background .2s ease,transform .2s ease;}
.prog-dots i.on{background:var(--vw-green);}
.prog-lbl{font-family:var(--vw-font-mono);font-size:12px;color:var(--vw-grey);letter-spacing:.02em;}

/* ---- Question ---- */
.q{font-weight:600;font-size:23px;line-height:1.32;letter-spacing:-.015em;color:var(--vw-black);
  text-wrap:pretty;}
.q b{font-weight:700;}
.lede{font-size:15px;line-height:1.55;color:var(--vw-grey-3);text-wrap:pretty;}

/* ---- Answer options ---- */
.opts{display:flex;flex-direction:column;gap:12px;}
.opt{
  appearance:none;width:100%;text-align:left;cursor:pointer;
  background:var(--vw-white);border:1px solid var(--vw-line-strong);
  border-radius:14px;padding:18px 18px;min-height:60px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  font-family:var(--vw-font);color:var(--vw-ink);
  transition:border-color .16s ease,background .16s ease,box-shadow .16s ease,transform .08s ease;
}
.opt:hover{border-color:var(--vw-black);}
.opt:active{transform:scale(.99);}
.opt .opt-main{display:flex;flex-direction:column;gap:3px;}
.opt .opt-label{font-weight:600;font-size:16px;line-height:1.25;}
.opt .opt-sub{font-size:13px;color:var(--vw-grey);line-height:1.35;}
.opt .opt-tick{flex-shrink:0;opacity:0;transform:scale(.6);transition:opacity .16s,transform .2s;}
.opt.is-sel{background:var(--vw-green);border-color:var(--vw-green);box-shadow:0 6px 18px -6px rgba(45,106,79,.45);}
.opt.is-sel .opt-label{color:#fff;}
.opt.is-sel .opt-sub{color:rgba(255,255,255,.82);}
.opt.is-sel .opt-tick{opacity:1;transform:scale(1);}
.opt.is-icon{align-items:flex-start;}
.opt .opt-ic{width:40px;height:40px;border-radius:11px;background:var(--vw-surface-3);
  display:flex;align-items:center;justify-content:center;color:var(--vw-grey-3);flex-shrink:0;
  transition:background .16s,color .16s;}
.opt.is-sel .opt-ic{background:rgba(255,255,255,.16);color:#fff;}
.opt-row{display:flex;align-items:center;gap:14px;flex:1;}

/* ---- Small yes/depends/no pills ---- */
.pills{display:flex;gap:8px;}
.pill{appearance:none;cursor:pointer;flex:1;
  background:var(--vw-white);border:1px solid var(--vw-line-strong);border-radius:10px;
  padding:11px 10px;font-family:var(--vw-font);font-weight:600;font-size:14px;color:var(--vw-ink);
  min-height:44px;transition:border-color .16s,background .16s,color .16s;}
.pill:hover{border-color:var(--vw-black);}
.pill.is-sel{background:var(--vw-green);border-color:var(--vw-green);color:#fff;}

/* ---- Buttons ---- */
.btn{appearance:none;cursor:pointer;font-family:var(--vw-font);font-weight:600;
  border:1px solid transparent;border-radius:12px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  transition:background .16s,border-color .16s,color .16s,transform .08s,box-shadow .16s;
  letter-spacing:-.005em;width:100%;min-height:52px;font-size:16px;}
.btn:active{transform:scale(.985);}
.btn-primary{background:var(--vw-green);color:#fff;box-shadow:0 8px 22px -10px rgba(45,106,79,.6);}
.btn-primary:hover{background:var(--vw-green-deep);}
.btn-primary:disabled{background:var(--vw-grey-2);box-shadow:none;cursor:not-allowed;}
.btn-secondary{background:#fff;color:var(--vw-ink);border-color:var(--vw-line-strong);box-shadow:none;}
.btn-secondary:hover{border-color:var(--vw-black);}
.btn-ghost{background:transparent;color:var(--vw-grey-3);min-height:44px;font-size:15px;width:auto;}
.btn-ghost:hover{color:var(--vw-black);}

/* ---- Inputs ---- */
.field{display:flex;flex-direction:column;gap:8px;}
.field-lbl{font-family:var(--vw-font);font-weight:500;font-size:12px;letter-spacing:.02em;
  color:var(--vw-ink-2);}
.field-lbl.mono{font-family:var(--vw-font-mono);text-transform:uppercase;letter-spacing:.07em;font-size:11px;color:var(--vw-grey);}
.input,.textarea{
  width:100%;background:#fff;border:1px solid var(--vw-line-strong);border-radius:10px;
  padding:14px 14px;font-family:var(--vw-font);font-size:16px;color:var(--vw-ink);outline:none;
  transition:border-color .16s,box-shadow .16s;}
.input{min-height:52px;}
.textarea{min-height:120px;resize:none;line-height:1.5;}
.input::placeholder,.textarea::placeholder{color:var(--vw-grey-2);}
.input:focus,.textarea:focus{border-color:var(--vw-green);box-shadow:0 0 0 3px var(--vw-green-ring);}
.input.err{border-color:var(--vw-danger);}
.input.err:focus{box-shadow:0 0 0 3px rgba(185,28,28,.15);}
.field-err{font-family:var(--vw-font-mono);font-size:12px;color:var(--vw-danger);letter-spacing:.01em;}

/* ---- Callout ---- */
.callout{background:var(--vw-green-tint);border-radius:12px;padding:16px 16px;
  display:flex;gap:12px;align-items:flex-start;}
.callout .ico{color:var(--vw-green);flex-shrink:0;margin-top:1px;}
.callout p{margin:0;font-size:14px;line-height:1.5;color:#23503D;}
.callout p b{font-weight:700;color:#1B3E2E;}

/* ---- Quote box ---- */
.quotebox{background:var(--vw-surface-2);border:1px solid var(--vw-line);border-radius:12px;
  padding:18px 18px;position:relative;}
.quotebox .qm{position:absolute;top:10px;left:14px;font-size:34px;line-height:1;color:var(--vw-line-strong);
  font-family:Georgia,serif;}
.quotebox p{margin:0;padding-left:26px;font-size:17px;line-height:1.45;font-weight:500;color:var(--vw-black);}

/* ---- Verified card (profile hero) ---- */
.vcard{background:#fff;border:1px solid var(--vw-line);border-radius:16px;
  box-shadow:0 1px 2px rgba(17,24,39,.05);overflow:hidden;}
.vcard .vc-pad{padding:22px;}
.vcard .vc-quote{font-size:16px;line-height:1.5;color:var(--vw-ink);font-weight:450;text-wrap:pretty;}
.divider{height:1px;background:var(--vw-line);border:0;margin:0;}

/* ---- Status pills (mono) ---- */
.spill{display:inline-flex;align-items:center;gap:6px;font-family:var(--vw-font-mono);
  font-size:11px;font-weight:500;letter-spacing:.03em;padding:5px 10px;border-radius:999px;}
.spill.verified{background:var(--vw-green-tint);color:#1F4A37;}
.spill.pending{background:var(--vw-warning-tint);color:#7A5708;}
.spill.draft{background:var(--vw-surface-3);color:var(--vw-grey-3);}
.spill.expired{background:var(--vw-danger-tint);color:var(--vw-danger);}

/* ---- Contribution badge (profile) ---- */
.contrib{display:inline-flex;align-items:center;gap:7px;font-family:var(--vw-font);
  font-weight:600;font-size:13px;color:var(--vw-black);
  background:var(--vw-surface-2);border:1px solid var(--vw-line);border-radius:999px;padding:5px 12px 5px 10px;}

/* ---- Stamp ---- */
.stamp{display:flex;align-items:center;justify-content:center;}
.stamp.go svg{animation:stamp-pop .28s cubic-bezier(.34,1.2,.5,1) both;}
@keyframes stamp-pop{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);}}
@media (prefers-reduced-motion:reduce){.stamp.go svg{animation:none;}}
.stamp-ring{position:absolute;border-radius:50%;border:2px solid var(--vw-green);opacity:0;}
.stamp.go .stamp-ring{animation:stamp-ring .6s ease-out .08s both;}
@keyframes stamp-ring{0%{transform:scale(.7);opacity:.5;}100%{transform:scale(1.5);opacity:0;}}

/* ---- Skeleton ---- */
.sk{background:linear-gradient(90deg,var(--vw-surface-3) 25%,#ECEEF1 37%,var(--vw-surface-3) 63%);
  background-size:400% 100%;border-radius:8px;animation:sk 1.4s ease infinite;}
@keyframes sk{0%{background-position:100% 0;}100%{background-position:0 0;}}

/* ---- Link ---- */
.tlink{display:inline-flex;align-items:center;gap:5px;color:var(--vw-green);font-weight:600;
  font-size:14px;text-decoration:none;cursor:pointer;}
.tlink:hover{color:var(--vw-green-deep);}

/* avatar */
.avi{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  color:#fff;font-weight:600;flex-shrink:0;overflow:hidden;}
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="22" fill="#1A1A1A"/>
  <path d="M28 36 L42 64 L50 50 L58 64 L74 32" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/>
  <circle cx="74" cy="34" r="9" fill="#2D6A4F"/>
  <path d="M70 34 l3 3 l6 -7" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

/* ===== ios-frame.jsx ===== */
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// Exports to window: ValidatorFlow

  { key: 'owner',    label: 'Owner',    sub: 'End-to-end ownership', icon: 'crown' },
  { key: 'executor', label: 'Executor', sub: "Tasks under someone's direction", icon: 'layers' },
  { key: 'partner',  label: 'Partner',  sub: 'Owned a specific area in a cross-functional project', icon: 'handshake' },
];

function ValidatorFlow({ tweaks, onComplete }) {
  const NAME    = tweaks.subjectName   || 'Frank Docent';
  const FIRST   = NAME.split(' ')[0];
  const PROJECT = tweaks.projectTitle  || 'brand identity redesign';
  const COMPANY = tweaks.projectCompany|| 'Studio Nord';

  const [step, setStep]       = React.useState(1);
  const [ans, setAns]         = React.useState({});
  const [sentence, setSentence] = React.useState('');
  const [again, setAgain]     = React.useState(null);
  const [stamping, setStamping] = React.useState(false);
  const scrollRef = React.useRef(null);

  const set = (k, v) => setAns(a => ({ ...a, [k]: v }));
  const advance = () => {
    setStep(s => s + 1);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };
  const back = () => {
    setStep(s => Math.max(1, s - 1));
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };
  const pickAndGo = (k, v) => { set(k, v); setTimeout(advance, 220); };

  const submit = () => {
    setStamping(true);
    setTimeout(() => onComplete && onComplete(), 1800);

  // ── Stamp success ─────────────────────────────────────────────────────

        </div>
      </div>

  return (
    <div className="scr" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>

      <div style={{ padding: '54px 24px 14px', display: 'flex', flexDirection: 'column', gap: 16,
        borderBottom: '1px solid var(--vw-line-faint)' }}>

              style={{ width: 'auto', minHeight: 36, padding: '0 12px', fontSize: 14, gap: 5, borderRadius: 9 }}>
              <Ic name="arrowLeft" size={15} /> Back
            </button>
          )}
        </div>
        <ProgressDots step={step} total={4} />
      </div>

      <div ref={scrollRef} className="vw-scroll" style={{ flex: 1, padding: '20px 24px 24px' }}>
        {step === 1 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
            <p className="q">
              {FIRST} says you worked together on the <b>{PROJECT}</b> at {COMPANY}. Is that right?
            </p>
            <div className="opts">
              <Option label="Yes, I can speak to his work" selected={ans.rel === 'yes'}  onClick={() => pickAndGo('rel', 'yes')} />
              <Option label="We were peers"                selected={ans.rel === 'peer'} onClick={() => pickAndGo('rel', 'peer')} />
              <Option label="I'm not the right person"    selected={ans.rel === 'no'}   onClick={() => pickAndGo('rel', 'no')} />
            </div>
          </div>
        )}

        {step === 2 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
            <p className="q">What was {FIRST}'s involvement?</p>
            <div className="opts">
              {CONTRIB.map(c => (
                <Option key={c.key} label={c.label} sub={c.sub} icon={c.icon}
                  selected={ans.contrib === c.key} onClick={() => pickAndGo('contrib', c.key)} />
              ))}
            </div>
          </div>
        )}

        {step === 3 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
            <p className="lede" style={{ marginBottom: -4 }}>{FIRST} described the outcome as:</p>
            <div className="quotebox">

              <p>{QUOTE}</p>
            </div>
            <p className="q" style={{ fontSize: 21 }}>Does this reflect what you saw?</p>
            <div className="opts">
              <Option label="Yes, that's accurate" selected={ans.outcome === 'accurate'} onClick={() => pickAndGo('outcome', 'accurate')} />
              <Option label="Roughly right"        selected={ans.outcome === 'rough'}    onClick={() => pickAndGo('outcome', 'rough')} />
              <Option label="Can't confirm this"   selected={ans.outcome === 'cant'}     onClick={() => pickAndGo('outcome', 'cant')} />
            </div>
          </div>
        )}

        {step === 4 && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            <p className="q">In your own words — what would you want someone hiring {FIRST} to know?</p>
            <div className="field">
              <textarea className="textarea" value={sentence}
                onChange={e => setSentence(e.target.value)}
                placeholder="He's the person I'd want on the hardest problem in the room…"
                maxLength={280} />
              <span className="field-lbl" style={{ color: 'var(--vw-grey)' }}>One sentence is enough.</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <span className="field-lbl mono">Would you work with him again?</span>
              <div className="pills">
                {['Yes', 'Depends', 'No'].map(p => (
                  <button key={p} className={'pill' + (again === p ? ' is-sel' : '')} onClick={() => setAgain(p)}>{p}</button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>

      {step === 4 && (
        <div style={{ padding: '12px 24px 40px', borderTop: '1px solid var(--vw-line-faint)' }}>
          <button className="btn btn-primary" disabled={!sentence.trim()} onClick={submit}>
            Submit endorsement
          </button>
        </div>
      )}
    </div>
  );
}

        </button>
      </div>
    </div>
  );
}

// ═══ ADD WORK ══════════════════════════════════════════════════════════════
function AddWorkScreen({ onNext, onBack }) {
  const [form, setForm] = React.useState({
    title: 'Brand identity redesign',
    company: 'Studio Nord',
    contrib: 'Partner',
    outcome: 'Increased client retention by 40% in six months',
  });
  const set = k => e => setForm(p => ({ ...p, [k]: e.target.value }));
  const valid = form.title.trim() && form.company.trim() && form.outcome.trim();

  return (
    <div className="scr" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '54px 22px 14px', display: 'flex', alignItems: 'center', gap: 12,
        borderBottom: '1px solid var(--vw-line-faint)' }}>
        <button className="btn btn-secondary" onClick={onBack} aria-label="Back"
          style={{ width: 40, height: 40, minHeight: 40, padding: 0, borderRadius: 11, flexShrink: 0 }}>
          <Ic name="arrowLeft" size={18} />
        </button>
        <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700 }}>Add project</h1>
      </div>
      <div className="vw-scroll" style={{ flex: 1, padding: '20px 22px 20px', display: 'flex', flexDirection: 'column', gap: 20 }}>
        <div className="field">
          <label className="field-lbl mono">Project name</label>
          <input className="input" value={form.title} onChange={set('title')} placeholder="What did you work on?" />
        </div>
        <div className="field">
          <label className="field-lbl mono">Company / client</label>
          <input className="input" value={form.company} onChange={set('company')} placeholder="Where?" />
        </div>
        <div className="field">
          <label className="field-lbl mono">Your contribution</label>
          <div className="pills">
            {['Owner', 'Partner', 'Executor'].map(c => (
              <button key={c} className={'pill' + (form.contrib === c ? ' is-sel' : '')}
                onClick={() => setForm(p => ({ ...p, contrib: c }))}>
                {c}
              </button>
            ))}
          </div>
        </div>
        <div className="field">
          <label className="field-lbl mono">Outcome claim</label>
          <textarea className="textarea" value={form.outcome} onChange={set('outcome')}
            placeholder="What changed because of this work?" style={{ minHeight: 88 }} />
          <span className="field-lbl" style={{ color: 'var(--vw-grey)' }}>
            Your validator will be asked to confirm this.
          </span>
        </div>
      </div>
      <div style={{ padding: '12px 22px 40px', borderTop: '1px solid var(--vw-line-faint)' }}>
        <button className="btn btn-primary" disabled={!valid} onClick={() => onNext(form)}>
          Next — invite validator
        </button>
      </div>
    </div>
  );
}

// ═══ INVITE VALIDATOR ══════════════════════════════════════════════════════
function InviteScreen({ onNext, onBack }) {
  const [name, setName] = React.useState('Jordan M.');
  const [email, setEmail] = React.useState('jordan@studionord.co');
  const valid = /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email) && name.trim();

  return (
    <div className="scr" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '54px 22px 14px', display: 'flex', alignItems: 'center', gap: 12,
        borderBottom: '1px solid var(--vw-line-faint)' }}>
        <button className="btn btn-secondary" onClick={onBack} aria-label="Back"
          style={{ width: 40, height: 40, minHeight: 40, padding: 0, borderRadius: 11, flexShrink: 0 }}>
          <Ic name="arrowLeft" size={18} />
        </button>
        <h1 style={{ margin: 0, fontSize: 18, fontWeight: 700 }}>Invite validator</h1>
      </div>
      <div className="vw-scroll" style={{ flex: 1, padding: '20px 22px 20px', display: 'flex', flexDirection: 'column', gap: 22 }}>
        <div className="callout">
          <Ic name="info" size={16} color="var(--vw-green)" />
          <p>Pick someone who was directly involved — a manager, client, or collaborator. They get a 2-minute form. No account needed.</p>
        </div>
        <div className="field">
          <label className="field-lbl mono">Their name</label>
          <input className="input" value={name} onChange={e => setName(e.target.value)} placeholder="Who are you inviting?" />
        </div>
        <div className="field">
          <label className="field-lbl mono">Their email</label>
          <input className="input" type="email" value={email} onChange={e => setEmail(e.target.value)}
            placeholder="their@email.com" inputMode="email" />
        </div>
      </div>
      <div style={{ padding: '12px 22px 40px', borderTop: '1px solid var(--vw-line-faint)' }}>
        <button className="btn btn-primary" disabled={!valid} onClick={() => onNext(email)}>
          Send verification request
        </button>
      </div>
    </div>
  );
}

// ═══ EMAIL SENT TO VALIDATOR ════════════════════════════════════════════════
function InvitedScreen({ validatorEmail, onPreview }) {
  return (
    <div className="scr" style={{ height: '100%', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', padding: '64px 28px 48px',
      textAlign: 'center', gap: 28 }}>
      <div style={{ position: 'relative', width: 72, height: 72 }}>
        <div style={{ width: 72, height: 72, borderRadius: 20, background: 'var(--vw-surface-2)',
          border: '1px solid var(--vw-line)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Ic name="share" size={28} color="var(--vw-black)" />
        </div>
        <span style={{ position: 'absolute', bottom: -6, right: -6 }}>
          <CheckDot size={24} />
        </span>
      </div>
      <div>
        <h1 style={{ margin: '0 0 12px', fontSize: 22, fontWeight: 700, letterSpacing: '-.015em' }}>
          Email sent to your validator.
        </h1>
        <p style={{ margin: '0 0 8px', fontSize: 15, color: 'var(--vw-grey)', lineHeight: 1.55, maxWidth: 290 }}>
          We've sent a verification request to
        </p>
        <span className="mono" style={{ fontSize: 13.5, color: 'var(--vw-black)', fontWeight: 500 }}>
          {validatorEmail}

// ═══ ROOT APP ══════════════════════════════════════════════════════════════
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"cardVariant":"classic"}/*EDITMODE-END*/;

const FRANK_CONTEXT = {
  subjectName: 'Frank Docent',
  outcomeClaim: 'Increased client retention by 40% in six months',
  projectTitle: 'brand identity redesign',
  projectCompany: 'Studio Nord',
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('splash');
  const [email, setEmail] = React.useState('frank@docent.co');
  const [user, setUser] = React.useState({ name: 'Frank Docent', role: 'Creative director' });
  const [validatorEmail, setValidatorEmail] = React.useState('jordan@studionord.co');
  const [flowKey, setFlowKey] = React.useState(0);

  const go = s => setScreen(s);
  const frankTweaks = { ...t, ...FRANK_CONTEXT };

  const renderScreen = () => {
    switch (screen) {
      case 'splash':    return <SplashScreen onNext={() => go('signup')} />;
      case 'signup':    return <SignupScreen onNext={e => { setEmail(e); go('link-sent'); }} />;
      case 'link-sent': return <LinkSentScreen email={email} onNext={() => go('onboarding')} />;
      case 'onboarding':return <OnboardingScreen onNext={u => { setUser(u); go('dashboard'); }} />;
      case 'dashboard': return <DashboardScreen user={user} onAddWork={() => go('add-work')} />;
      case 'add-work':  return <AddWorkScreen onNext={() => go('invite')} onBack={() => go('dashboard')} />;
      case 'invite':    return <InviteScreen onNext={e => { setValidatorEmail(e); go('invited'); }} onBack={() => go('add-work')} />;
      case 'invited':   return <InvitedScreen validatorEmail={validatorEmail} onPreview={() => go('validator')} />;
      case 'validator': return <ValidatorFlow key={flowKey} tweaks={frankTweaks} onComplete={() => setTimeout(() => go('profile'), 120)} />;
      case 'profile':   return <ProfileScreen tweaks={frankTweaks} onRestart={() => { setFlowKey(k => k + 1); go('splash'); }} />;
      default: return null;
    }
  };

  return (
    <div className="stage">
      <div className="stage-cap">
        <span>verified</span><span className="dot" /><span>work · prototype</span>
      </div>

      <IOSDevice width={390} height={844}>
        <div className="vw-app">{renderScreen()}</div>
      </IOSDevice>

      <p className="stage-hint">
        Full flow: <b>signup → onboarding → dashboard → add work → invite → validator → profile.</b><br />
        Open <b>Tweaks</b> to swap profile card styles.
      </p>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Profile card style" />
        <TweakSelect label="Style" value={t.cardVariant}
          options={[
            { value: 'classic', label: 'Classic record' },
            { value: 'quote', label: 'Quote-led' },
            { value: 'receipt', label: 'Receipt' },
          ]}
          onChange={v => setTweak('cardVariant', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
