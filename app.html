<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>verified.work - the app</title>
<meta name="description" content="Your verified professional profile - endorsed by the people who were there.">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#2D6A4F; --green-2:#40916C; --green-tint:#D8F3DC; --green-deep:#1F4A37;
  --green-ring:rgba(45,106,79,.22);
  --black:#1A1A1A; --white:#FFFFFF;
  --grey:#6B7280; --grey-2:#9CA3AF; --grey-3:#4B5563; --ink-2:#374151;
  --line:#E5E7EB; --line-strong:#D1D5DB; --line-faint:#F3F4F6;
  --surface-2:#F9FAFB; --surface-3:#F3F4F6;
  --warning:#B5800B; --warning-tint:#FEF3C7;
  --danger:#B91C1C; --danger-tint:#FEE2E2;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --label:'Space Grotesk','Inter',sans-serif;   /* label / accent font - pairs with Inter, not monospace */
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --ease-stamp:cubic-bezier(0.2,1.3,0.4,1);
  --fs-body:clamp(15px,0.3vw + 13px,17px);
  --fs-lede:clamp(16px,0.7vw + 13px,20px);
  --fs-h3:clamp(19px,0.9vw + 15px,25px);
  --fs-h2:clamp(26px,2vw + 16px,42px);
  --fs-h1:clamp(30px,3vw + 16px,48px);
  --nav-h:64px;
  --shadow-sm:0 1px 2px rgba(17,24,39,.05);
  --shadow-md:0 18px 40px -16px rgba(26,26,26,.18);
  --shadow-lg:0 26px 52px -16px rgba(26,26,26,.28);
}
*,*::before,*::after{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;font-family:var(--font);font-size:var(--fs-body);line-height:1.5;color:var(--black);
  background:var(--white);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
img,svg{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
::selection{background:var(--green-tint);color:var(--green-deep);}
a{color:inherit;}

/* shell */
#root{min-height:100vh;}
.app{min-height:100vh;display:flex;flex-direction:column;}
.app-nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);
  background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid transparent;transition:border-color 200ms var(--ease-out);}
.app-nav.scrolled{border-color:var(--line);}
.app-nav .inner{height:100%;max-width:1180px;margin:0 auto;padding:0 clamp(18px,3vw,40px);
  display:flex;align-items:center;justify-content:space-between;gap:16px;}
.wm{display:inline-flex;align-items:center;text-decoration:none;color:var(--black);
  font-weight:700;font-size:clamp(16px,0.5vw + 14px,19px);letter-spacing:-.015em;line-height:1;}
.wm .work{font-weight:400;color:var(--grey);}
.wm .check{display:inline-flex;align-items:center;justify-content:center;width:12px;height:12px;
  border-radius:50%;background:var(--green);margin:0 2px;flex-shrink:0;}
.wm .check svg{width:8px;height:8px;}
.nav-actions{display:inline-flex;align-items:center;gap:10px;position:relative;}
.nav-menu-btn{width:38px;height:38px;border-radius:50%;background:transparent;border:1px solid var(--line);
  display:inline-flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:0;
  transition:background 150ms,border-color 150ms;}
.nav-menu-btn:hover{background:var(--surface-2);border-color:var(--grey-2);}
.nav-menu-btn span{display:block;width:16px;height:2px;background:var(--black);border-radius:2px;
  transition:transform 220ms var(--ease-out),opacity 180ms;}
.nav-menu-btn.open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.nav-menu-btn.open span:nth-child(2){opacity:0;}
.nav-menu-btn.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
.nav-menu{position:absolute;top:calc(100% + 12px);right:0;min-width:236px;background:var(--white);
  border:1px solid var(--line);border-radius:14px;padding:6px;box-shadow:var(--shadow-md);
  opacity:0;transform:translateY(-8px) scale(.96);transform-origin:top right;
  transition:opacity 180ms var(--ease-out),transform 220ms var(--ease-out);pointer-events:none;z-index:110;}
.nav-menu.open{opacity:1;transform:none;pointer-events:auto;}
.nav-menu .mi{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 12px;border:0;
  background:transparent;border-radius:9px;font-size:14px;font-weight:500;color:var(--black);text-decoration:none;
  transition:background 150ms,color 150ms;cursor:pointer;}
.nav-menu .mi:hover{background:var(--surface-2);color:var(--green);}
.nav-menu .mi.active{color:var(--green);background:var(--green-tint);}
.nav-menu .mi svg{width:16px;height:16px;color:var(--grey);flex-shrink:0;}
.nav-menu .mi:hover svg,.nav-menu .mi.active svg{color:var(--green);}
.nav-menu .mi.danger{color:var(--danger);} .nav-menu .mi.danger svg{color:var(--danger);}
.nav-menu .mi.danger:hover{background:var(--danger-tint);color:var(--danger);}
.nav-menu .sep{height:1px;background:var(--line);margin:6px 8px;}
.nav-menu .mlabel{font-family:var(--label);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--grey-2);padding:8px 12px 4px;}

.app-main{flex:1;padding-top:var(--nav-h);display:flex;flex-direction:column;}
.screen{flex:1;width:100%;animation:scr-in .42s var(--ease-out) both;}
@keyframes scr-in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.wrap{width:100%;margin:0 auto;padding-left:clamp(20px,4vw,40px);padding-right:clamp(20px,4vw,40px);}
.wrap-sm{max-width:560px;} .wrap-md{max-width:760px;} .wrap-lg{max-width:1040px;}

/* type */
.eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:var(--label);font-size:12px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--green);}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--green);}
.lblf{font-family:var(--label);letter-spacing:.01em;}
.h1{font-weight:700;font-size:var(--fs-h1);line-height:1.06;letter-spacing:-.03em;margin:0;text-wrap:balance;}
.h2{font-weight:700;font-size:var(--fs-h2);line-height:1.1;letter-spacing:-.025em;margin:0;text-wrap:balance;}
.h3{font-weight:700;font-size:var(--fs-h3);line-height:1.2;letter-spacing:-.02em;margin:0;}
.lede{font-size:var(--fs-lede);color:var(--grey);line-height:1.55;margin:0;}
.muted{color:var(--grey);}

/* buttons - black pill primary (green hover); green reserved for verification */
.btn{appearance:none;border:1px solid transparent;border-radius:11px;font-weight:600;font-size:14.5px;
  letter-spacing:-.005em;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:46px;padding:0 20px;transition:background 150ms,border-color 150ms,color 150ms,transform 80ms,box-shadow 150ms;}
.btn:active{transform:scale(.985);}
.btn.block{width:100%;}
.btn.pill{border-radius:999px;}
.btn-lg{min-height:52px;font-size:15.5px;padding:0 26px;}
.btn-primary{background:var(--black);color:var(--white);}
.btn-primary:hover{background:var(--green);}
.btn-primary:disabled{background:var(--grey-2);cursor:not-allowed;}
.btn-secondary{background:var(--white);color:var(--black);border-color:var(--line-strong);}
.btn-secondary:hover{border-color:var(--black);}
.btn-ghost{background:transparent;color:var(--grey-3);min-height:42px;}
.btn-ghost:hover{color:var(--black);}
.btn-sm{min-height:40px;padding:0 16px;font-size:14px;border-radius:10px;}
.btn-danger{background:var(--white);color:var(--danger);border-color:var(--danger-tint);}
.btn-danger:hover{background:var(--danger-tint);}
.btn-google{background:var(--white);color:#3c4043;border:1px solid var(--line-strong);font-weight:600;}
.btn-google:hover{background:var(--surface-2);border-color:var(--grey-2);box-shadow:var(--shadow-sm);}
.btn-icon{width:42px;height:42px;min-height:42px;padding:0;border-radius:11px;flex-shrink:0;}
.divider-or{display:flex;align-items:center;gap:14px;color:var(--grey-2);font-size:13px;}
.divider-or::before,.divider-or::after{content:"";flex:1;height:1px;background:var(--line);}

/* forms */
.field{display:flex;flex-direction:column;gap:8px;}
.field-lbl{font-family:var(--label);font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);}
.input,.textarea{width:100%;background:var(--white);border:1px solid var(--line-strong);border-radius:12px;
  padding:13px 15px;font-size:16px;color:var(--black);outline:none;transition:border-color .16s,box-shadow .16s;}
.input{min-height:50px;}
.textarea{min-height:108px;resize:none;line-height:1.5;}
.input::placeholder,.textarea::placeholder{color:var(--grey-2);}
.input:focus,.textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-ring);}
.input.err{border-color:var(--danger);}
.field-err{font-family:var(--label);font-size:12.5px;color:var(--danger);}
.row2{display:grid;grid-template-columns:1fr;gap:18px;}
@media(min-width:560px){.row2{grid-template-columns:1fr 1fr;}}
.select{appearance:none;-webkit-appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%236B7280' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' d='M1 1.5 6 6.5l5-5'/></svg>");
  background-repeat:no-repeat;background-position:right 14px center;padding-right:38px;}
.tier-preview{display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;animation:rise .4s var(--ease-out) both;}
.pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{appearance:none;flex:1;min-width:80px;background:var(--white);border:1px solid var(--line-strong);
  border-radius:10px;padding:11px 12px;font-weight:600;font-size:14px;color:var(--black);min-height:46px;
  transition:border-color .16s,background .16s,color .16s;}
.pill:hover{border-color:var(--black);}
.pill.sel{background:var(--green);border-color:var(--green);color:#fff;}
.helper{font-size:13px;color:var(--grey);}

/* wizard progress */
.wiz{margin-bottom:26px;}
.wiz-top{display:flex;align-items:center;gap:14px;}
.wiz-back{width:36px;height:36px;border-radius:10px;border:1px solid var(--line-strong);background:#fff;color:var(--ink-2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s;}
.wiz-back:hover{border-color:var(--black);}
.wiz-bar{flex:1;height:6px;border-radius:999px;background:var(--surface-3);overflow:hidden;}
.wiz-bar i{display:block;height:100%;background:var(--green);border-radius:999px;transition:width .5s var(--ease-out);}
.wiz-step{font-family:var(--label);font-size:12px;font-weight:600;color:var(--grey);min-width:34px;text-align:right;}
.qgroup{display:flex;flex-direction:column;gap:10px;}
.q-lbl{font-weight:600;font-size:16px;letter-spacing:-.01em;}

/* artifact attach */
.atabs{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:4px;}
.atab{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;border:0;background:transparent;
  border-radius:8px;padding:9px;font-weight:600;font-size:13.5px;color:var(--grey-3);transition:background .15s,color .15s;}
.atab svg{width:15px;height:15px;}
.atab.sel{background:var(--white);color:var(--black);box-shadow:var(--shadow-sm);}
.drop{border:1.5px dashed var(--line-strong);border-radius:12px;padding:22px;text-align:center;color:var(--grey);
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s,background .15s;}
.drop:hover{border-color:var(--green);background:var(--surface-2);}
.drop svg{width:22px;height:22px;color:var(--grey-3);}
.art-prev{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--white);}
.art-prev img{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.art-prev .ic{width:46px;height:46px;border-radius:8px;background:var(--green-tint);color:var(--green);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.art-prev .nm{flex:1;min-width:0;font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.art-prev .rm{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--grey);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.art-prev .rm:hover{border-color:var(--danger);color:var(--danger);}

/* photo upload + preview card */
.photo-up{display:flex;align-items:center;gap:16px;}
.photo-btn{width:72px;height:72px;border-radius:50%;border:1.5px dashed var(--line-strong);background:var(--surface-2);
  color:var(--grey-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;transition:border-color .15s;}
.photo-btn:hover{border-color:var(--green);}
.photo-btn img{width:100%;height:100%;object-fit:cover;}
.prevcard{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:20px;
  display:flex;align-items:center;gap:16px;}

/* cards + expandable */
.card{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);}
.card-pad{padding:clamp(18px,2.4vw,24px);}
.xcard{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);
  overflow:hidden;transition:border-color .2s var(--ease-out),box-shadow .2s var(--ease-out);}
.xcard:hover{box-shadow:var(--shadow-md);}
.xcard.open{border-color:var(--green);}
.xcard-head{display:flex;align-items:flex-start;gap:14px;padding:clamp(16px,2.2vw,22px);cursor:pointer;
  text-align:left;width:100%;background:transparent;border:0;}
.xcard-head .x-main{flex:1;min-width:0;}
.xcard-toggle{width:30px;height:30px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);
  color:var(--grey-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
  transition:transform .34s var(--ease-out),background .2s,color .2s,border-color .2s;}
.xcard-toggle svg{width:14px;height:14px;}
.xcard.open .xcard-toggle{transform:rotate(180deg);background:var(--green);color:#fff;border-color:var(--green);}
.xcard-more{display:grid;grid-template-rows:0fr;transition:grid-template-rows .44s var(--ease-out);}
.xcard.open .xcard-more{grid-template-rows:1fr;}
.xcard-more-inner{overflow:hidden;}
.status{display:inline-flex;align-items:center;gap:6px;font-family:var(--label);font-size:11.5px;font-weight:600;
  letter-spacing:.02em;padding:5px 10px;border-radius:999px;}
.status.verified{background:var(--green-tint);color:#1F4A37;}
.status.pending{background:var(--warning-tint);color:#7A5708;}
.status.unverified{background:var(--surface-3);color:var(--grey-3);}
.contrib{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:var(--black);
  background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 10px;}
.receipt-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;border-top:1px solid var(--line);}
.receipt-row .k{font-family:var(--label);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--grey);}
.receipt-row .v{font-size:14px;font-weight:600;text-align:right;}
.quotebox{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;position:relative;}
.quotebox .qm{position:absolute;top:8px;left:14px;font-size:36px;line-height:1;color:var(--line-strong);font-family:Georgia,serif;}
.quotebox p{margin:0;padding-left:24px;font-size:16px;line-height:1.5;font-weight:500;color:var(--black);}
.tlink{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:600;font-size:14px;text-decoration:none;}
.tlink svg{width:14px;height:14px;transition:transform .2s var(--ease-out);}
.tlink:hover svg{transform:translate(3px,-3px);}
.callout{background:var(--green-tint);border-radius:14px;padding:16px 18px;display:flex;gap:12px;align-items:flex-start;}
.callout svg{color:var(--green);flex-shrink:0;margin-top:2px;width:18px;height:18px;}
.callout p{margin:0;font-size:14px;line-height:1.5;color:#23503D;}
.callout p b{color:#1B3E2E;}
.avi{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:600;
  flex-shrink:0;overflow:hidden;background:var(--black);}
.avi img{width:100%;height:100%;object-fit:cover;}
.check-dot{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--green);flex-shrink:0;}

/* empty state */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;padding:clamp(40px,8vw,90px) 20px;}
.empty .ic{width:64px;height:64px;border-radius:18px;background:var(--surface-2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;color:var(--grey-3);}

/* auth */
.auth{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;
  padding:clamp(32px,6vw,72px) 20px;text-align:center;min-height:calc(100vh - var(--nav-h));}
.auth-icon{width:clamp(64px,9vw,84px);height:clamp(64px,9vw,84px);margin:0 auto 22px;
  opacity:0;transform:scale(.7);animation:stamp-in 800ms var(--ease-stamp) 120ms forwards;}
.auth-icon svg{width:100%;height:100%;overflow:visible;}
.auth-icon .vp,.auth-icon .wp{fill:none;stroke-width:14;stroke-linecap:round;stroke-linejoin:miter;stroke-miterlimit:6;
  stroke-dasharray:600;stroke-dashoffset:600;animation:draw 900ms var(--ease-out) 420ms forwards;}
.auth-icon .vp{stroke:var(--black);} .auth-icon .wp{stroke:var(--green-2);animation-delay:620ms;}
.auth h1{font-weight:700;font-size:clamp(26px,3vw + 12px,38px);line-height:1.1;letter-spacing:-.03em;margin:0 0 12px;
  opacity:0;transform:translateY(14px);animation:rise 700ms var(--ease-out) 600ms forwards;}
.auth-sub{max-width:34ch;margin:0 auto;color:var(--grey);font-size:var(--fs-lede);
  opacity:0;transform:translateY(12px);animation:rise 700ms var(--ease-out) 780ms forwards;}
.auth-card{width:100%;max-width:400px;margin:clamp(26px,3vw,38px) auto 0;display:flex;flex-direction:column;gap:13px;
  opacity:0;transform:translateY(12px);animation:rise 700ms var(--ease-out) 960ms forwards;}
.auth-legal{font-size:12px;color:var(--grey-2);max-width:38ch;margin:18px auto 0;line-height:1.5;
  opacity:0;animation:rise 700ms var(--ease-out) 1160ms forwards;}
.auth-legal a{color:var(--grey);text-decoration:underline;text-underline-offset:2px;}

/* modal */
.modal-back{position:fixed;inset:0;z-index:300;background:rgba(17,24,39,.45);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s ease both;}
.gmodal{width:100%;max-width:400px;background:#fff;border-radius:18px;overflow:hidden;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.5);animation:pop .34s var(--ease-stamp) both;text-align:center;}
.gspin{display:flex;flex-direction:column;align-items:center;gap:18px;padding:44px 24px;}
.gspin .g-logo{margin-bottom:2px;}
.gspin .ttl{font-weight:600;font-size:16px;color:#202124;}
.gspin .sub{font-size:13px;color:#5f6368;}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--green);animation:spin .8s linear infinite;}
.cmodal{width:100%;max-width:420px;background:#fff;border-radius:18px;padding:26px;text-align:left;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.5);animation:pop .34s var(--ease-stamp) both;}
.cmodal .ic{width:48px;height:48px;border-radius:14px;background:var(--danger-tint);color:var(--danger);
  display:flex;align-items:center;justify-content:center;margin-bottom:16px;}

/* dashboard */
.dash-hd{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:26px;}
.complete{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:26px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.complete .bar{flex:1;min-width:160px;height:8px;border-radius:999px;background:var(--surface-3);overflow:hidden;}
.complete .bar i{display:block;height:100%;background:var(--green);border-radius:999px;transition:width 900ms var(--ease-out);}
.sec-head{display:flex;align-items:center;gap:12px;margin:0 0 16px;}
.sec-head .n{font-family:var(--label);font-size:12px;font-weight:600;color:var(--grey-2);}
.sec-head .ln{flex:1;height:1px;background:var(--line);}
.stack{display:flex;flex-direction:column;gap:14px;}

/* profile */
.pf-head{display:flex;gap:clamp(18px,3vw,30px);align-items:flex-start;flex-wrap:wrap;margin-bottom:8px;}
.pf-id{flex:1;min-width:240px;}
.pf-name{font-weight:700;font-size:clamp(26px,2.4vw + 16px,40px);letter-spacing:-.03em;line-height:1.05;margin:0 0 6px;}
.pf-role{font-size:var(--fs-lede);color:var(--ink-2);margin:0 0 8px;}
.pf-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:var(--grey);font-size:14px;}
.pf-meta .it{display:inline-flex;align-items:center;gap:6px;}
.pf-meta .it svg{width:15px;height:15px;}
.pf-bio{margin:16px 0 0;font-size:var(--fs-body);color:var(--ink-2);line-height:1.6;max-width:62ch;}
.pf-actions{display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;}
.pf-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:26px 0;}
@media (min-width:640px){.pf-stats{grid-template-columns:repeat(4,1fr);}}
.stat{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
.stat .num{font-weight:800;font-size:clamp(24px,2vw + 14px,32px);letter-spacing:-.02em;line-height:1;display:inline-flex;align-items:center;gap:7px;}
.stat .lbl{margin-top:7px;font-family:var(--label);font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--grey);}
.badges{display:flex;gap:10px;flex-wrap:wrap;}
.endorse{display:grid;gap:14px;}
@media (min-width:720px){.endorse{grid-template-columns:1fr 1fr;}}
.danger-zone{margin-top:42px;border:1px solid var(--danger-tint);border-radius:16px;padding:20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.danger-zone .t{font-weight:700;color:var(--danger);}
.danger-zone .s{font-size:13.5px;color:var(--grey);margin-top:3px;}

/* validator */
.vintro{display:flex;flex-direction:column;align-items:center;text-align:center;gap:22px;padding:clamp(28px,5vw,56px) 0;}
.opts{display:flex;flex-direction:column;gap:12px;}
.opt{appearance:none;width:100%;text-align:left;background:var(--white);border:1px solid var(--line-strong);
  border-radius:14px;padding:16px 18px;min-height:60px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  color:var(--black);transition:border-color .16s,background .16s,box-shadow .16s,transform .08s;}
.opt:hover{border-color:var(--black);}
.opt:active{transform:scale(.99);}
.opt .o-row{display:flex;align-items:center;gap:14px;flex:1;}
.opt .o-ic{width:40px;height:40px;border-radius:11px;background:var(--surface-3);display:flex;align-items:center;
  justify-content:center;color:var(--grey-3);flex-shrink:0;transition:background .16s,color .16s;}
.opt .o-label{font-weight:600;font-size:16px;}
.opt .o-sub{font-size:13px;color:var(--grey);margin-top:3px;}
.opt .o-tick{opacity:0;transform:scale(.6);transition:opacity .16s,transform .2s;color:#fff;}
.opt.sel{background:var(--green);border-color:var(--green);box-shadow:0 8px 22px -8px rgba(45,106,79,.5);}
.opt.sel .o-label{color:#fff;}
.opt.sel .o-sub{color:rgba(255,255,255,.82);}
.opt.sel .o-ic{background:rgba(255,255,255,.16);color:#fff;}
.opt.sel .o-tick{opacity:1;transform:scale(1);}
.stamp-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.stamp-svg{animation:stamp-pop .42s var(--ease-stamp) both;}
.stamp-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--green);opacity:0;animation:stamp-ring .6s ease-out .1s both;}

/* reveal + footer */
.reveal{opacity:0;transform:translateY(28px);transition:opacity 700ms var(--ease-out),transform 700ms var(--ease-out);}
.reveal.in{opacity:1;transform:none;}
.app-foot{border-top:1px solid var(--line);background:var(--surface-2);margin-top:48px;}
.app-foot .inner{max-width:1040px;margin:0 auto;padding:24px clamp(20px,4vw,40px);
  display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--grey);}
.app-foot a{color:var(--grey);text-decoration:none;font-weight:500;}
.app-foot a:hover{color:var(--green);}

@keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@keyframes stamp-in{0%{opacity:0;transform:scale(.65);}60%{opacity:1;transform:scale(1.05);}100%{opacity:1;transform:scale(1);}}
@keyframes stamp-pop{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);}}
@keyframes stamp-ring{0%{transform:scale(.7);opacity:.5;}100%{transform:scale(1.6);opacity:0;}}
@keyframes draw{to{stroke-dashoffset:0;}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@keyframes pop{from{opacity:0;transform:scale(.92) translateY(10px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important;}
  .reveal{opacity:1;transform:none;}
}
</style>
</head>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- Icons ---------- */
function Ic({ name, size = 20, stroke = 1.8, color = 'currentColor', style }) {
  const P = { fill:'none', stroke:color, strokeWidth:stroke, strokeLinecap:'round', strokeLinejoin:'round' };
  const paths = {

    layers:<><polygon points="12 2 2 7 12 12 22 7 12 2" {...P}/><polyline points="2 17 12 22 22 17" {...P}/><polyline points="2 12 12 17 22 12" {...P}/></>,
    handshake:<><path d="m11 17 2 2a1 1 0 1 0 3-3" {...P}/><path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4" {...P}/><path d="m21 3 1 11h-2" {...P}/><path d="M3 3 2 14l6.5 6.5a1 1 0 1 0 3-3" {...P}/><path d="M3 4h8" {...P}/></>,
    info:<><circle cx="12" cy="12" r="10" {...P}/><line x1="12" y1="16" x2="12" y2="12" {...P}/><line x1="12" y1="8" x2="12.01" y2="8" {...P}/></>,
    inbox:<><polyline points="22 12 16 12 14 15 10 15 8 12 2 12" {...P}/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z" {...P}/></>,
    share:<><circle cx="18" cy="5" r="3" {...P}/><circle cx="6" cy="12" r="3" {...P}/><circle cx="18" cy="19" r="3" {...P}/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49" {...P}/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" {...P}/></>,
    refresh:<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" {...P}/><path d="M21 3v5h-5" {...P}/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" {...P}/><path d="M8 16H3v5" {...P}/></>,
    mapPin:<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" {...P}/><circle cx="12" cy="10" r="3" {...P}/></>,
    edit:<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" {...P}/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" {...P}/></>,
    shield:<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" {...P}/><path d="m9 12 2 2 4-4" {...P}/></>,
    fileText:<><path d="M14 3v4a1 1 0 0 0 1 1h4" {...P}/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2Z" {...P}/><path d="M9 13h6M9 17h4" {...P}/></>,
    sparkle:<path d="m12 3 1.9 5.8a2 2 0 0 0 1.3 1.3L21 12l-5.8 1.9a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.8a2 2 0 0 0-1.3-1.3L3 12l5.8-1.9a2 2 0 0 0 1.3-1.3z" {...P}/>,
    logout:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" {...P}/><polyline points="16 17 21 12 16 7" {...P}/><line x1="21" y1="12" x2="9" y2="12" {...P}/></>,
    grid:<><rect x="3" y="3" width="7" height="7" rx="1" {...P}/><rect x="14" y="3" width="7" height="7" rx="1" {...P}/><rect x="3" y="14" width="7" height="7" rx="1" {...P}/><rect x="14" y="14" width="7" height="7" rx="1" {...P}/></>,
    user:<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" {...P}/><circle cx="12" cy="7" r="4" {...P}/></>,
    send:<><path d="m22 2-7 20-4-9-9-4Z" {...P}/><path d="M22 2 11 13" {...P}/></>,
    link:<><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" {...P}/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" {...P}/></>,
    image:<><rect x="3" y="3" width="18" height="18" rx="2" {...P}/><circle cx="9" cy="9" r="2" {...P}/><path d="m21 15-3.5-3.5a2 2 0 0 0-2.8 0L6 21" {...P}/></>,
    paperclip:<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" {...P}/>,
    upload:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" {...P}/><polyline points="17 8 12 3 7 8" {...P}/><line x1="12" y1="3" x2="12" y2="15" {...P}/></>,
    trash:<><polyline points="3 6 5 6 21 6" {...P}/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" {...P}/></>,
    camera:<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z" {...P}/><circle cx="12" cy="13" r="3" {...P}/></>,
    calendar:<><rect x="3" y="4" width="18" height="18" rx="2" {...P}/><line x1="16" y1="2" x2="16" y2="6" {...P}/><line x1="8" y1="2" x2="8" y2="6" {...P}/><line x1="3" y1="10" x2="21" y2="10" {...P}/></>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" style={{display:'block',flexShrink:0,...style}} aria-hidden="true">{paths[name]}</svg>;
}
function Wordmark(){ return (<span className="wm"><span>verified</span>
  <span className="check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
  <span className="work">work</span></span>); }
function CheckDot({ size=18 }){ return <span className="check-dot" style={{width:size,height:size}}><Ic name="check" size={size*0.62} color="#fff" stroke={2.8}/></span>; }
function Avatar({ name='', size=56, src }){
  const initials=name.trim().split(/\s+/).map(p=>p[0]).slice(0,2).join('').toUpperCase()||'?';
  return <span className="avi" style={{width:size,height:size,fontSize:size*0.36,background:src?'transparent':'var(--black)'}}>
    {src ? <img src={src} alt={name}/> : initials}</span>;
}
function MarkIcon(){ return (<div className="auth-icon" aria-hidden="true"><svg viewBox="0 0 100 100">
  <path className="vp" d="M 12 30 L 31 77 L 50 53"/><path className="wp" d="M 50 53 L 69 77 L 88 23"/></svg></div>); }
function GoogleG({ size=18 }){ return (<svg width={size} height={size} viewBox="0 0 48 48" aria-hidden="true">
  <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
  <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
  <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
  <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>); }
function Reveal({ children, className='', delay=0, style }){
  const ref=useRef(null); const [seen,setSeen]=useState(false);
  useEffect(()=>{ const el=ref.current; if(!el) return;
    const io=new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting){ setSeen(true); io.unobserve(e.target); } }),
      { threshold:0.15, rootMargin:'0px 0px -50px 0px' });
    io.observe(el); return ()=>io.disconnect(); },[]);
  return <div ref={ref} className={'reveal '+(seen?'in ':'')+className} style={{transitionDelay:(seen?delay:0)+'ms',...style}}>{children}</div>;
}
function Stamp({ size=104 }){ return (<div className="stamp-wrap" style={{width:size,height:size}}>
  <span className="stamp-ring"/><svg className="stamp-svg" width={size} height={size} viewBox="0 0 96 96">
  <circle cx="48" cy="48" r="48" fill="var(--green)"/>
  <polyline points="29 49 42 62 67 34" fill="none" stroke="#fff" strokeWidth="7" strokeLinecap="round" strokeLinejoin="round"/></svg></div>); }

/* ---------- data + helpers ---------- */
const CONTRIB_DEF = [
  { key:'Owner', label:'Owner', sub:'End-to-end ownership', icon:'crown' },
  { key:'Partner', label:'Partner', sub:'Owned a specific area', icon:'handshake' },
  { key:'Executor', label:'Executor', sub:"Tasks under direction", icon:'layers' },
];
const REL_OPTIONS = ['Manager','Founder','Client','Professor','Colleague / peer','Other'];
const FREE_MAIL = ['gmail.com','yahoo.com','outlook.com','hotmail.com','icloud.com','proton.me','protonmail.com','live.com','aol.com'];
function badgeTier(email){
  const at=email.indexOf('@'); if(at<0||!/\.[^@\s]+$/.test(email)) return null;
  const d=email.slice(at+1).toLowerCase();
  if(/(\.edu|\.ac\.[a-z]{2,}|\.edu\.[a-z]{2,})$/.test(d)) return { kind:'academic', label:'Academic verified' };
  if(FREE_MAIL.includes(d)) return { kind:'peer', label:'Peer verified' };
  return { kind:'company', label:'Company verified' };
}
const NOW = 2026;
const YEARS = Array.from({length:NOW-1999},(_,i)=>String(NOW-i));
function periodLabel(s,e){ if(!s) return ''; const end = e==='Present'||!e ? 'Present' : e; return s===end?s:(s+'–'+end); }
function durationLabel(s,e){ if(!s) return ''; const sy=+s, ey=(e==='Present'||!e)?NOW:+e; const y=Math.max(0,ey-sy);
  return y<=0?'under a year':(y+' yr'+(y>1?'s':'')); }
const emailOk = v => /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v);
function readPending(){ try{ const r=localStorage.getItem('vw_pending'); return r?JSON.parse(r):null; }catch(_){ return null; } }

/* ---------- shared bits ---------- */
function WizBar({ current, total, label, onBack }){
  return (<div className="wiz">
    <div className="wiz-top">
      {onBack ? <button className="wiz-back" onClick={onBack} aria-label="Back"><Ic name="arrowLeft" size={16}/></button> : <span style={{width:36}}/>}
      <div className="wiz-bar"><i style={{width:(current/total*100)+'%'}}/></div>
      <span className="wiz-step">{current}/{total}</span>
    </div>
    {label && <h1 className="h2" style={{marginTop:16,fontSize:'clamp(22px,2vw,30px)'}}>{label}</h1>}
  </div>);
}
function QGroup({ label, options, value, onChange }){
  return (<div className="qgroup">
    <div className="q-lbl">{label}</div>
    <div className="pills">{options.map(o=>{ const v=o.v||o, l=o.l||o;
      return <button key={v} className={'pill'+(value===v?' sel':'')} onClick={()=>onChange(v)}>{l}</button>; })}</div>
  </div>);
}
function Opt({ label, sub, icon, sel, onClick }){
  return (<button className={'opt'+(sel?' sel':'')} onClick={onClick}>
    <span className="o-row">{icon&&<span className="o-ic"><Ic name={icon} size={20}/></span>}
      <span><span className="o-label" style={{display:'block'}}>{label}</span>{sub&&<span className="o-sub" style={{display:'block'}}>{sub}</span>}</span></span>
    <span className="o-tick"><Ic name="check" size={20} color="#fff" stroke={2.4}/></span></button>);
}

/* ---------- Artifact attach (link / image / file) ---------- */
function ArtifactInput({ value, onChange }){
  const [type,setType]=useState(value?value.type:'link');
  const [link,setLink]=useState(value&&value.type==='link'?value.value:'');
  const fileRef=useRef(null);
  const onFile=(e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return;
    const url=URL.createObjectURL(f);
    onChange({ type: f.type.indexOf('image/')===0?'image':'file', value:url, name:f.name }); };
  const tabs=[{k:'link',l:'Link',i:'link'},{k:'image',l:'Image',i:'image'},{k:'file',l:'File',i:'paperclip'}];
  return (<div style={{display:'flex',flexDirection:'column',gap:12}}>
    <div className="atabs">{tabs.map(t=>(
      <button key={t.k} className={'atab'+(type===t.k?' sel':'')} onClick={()=>setType(t.k)} type="button"><Ic name={t.i} size={15}/>{t.l}</button>))}</div>
    {value ? (
      <div className="art-prev">
        {value.type==='image' ? <img src={value.value} alt=""/> : <span className="ic"><Ic name={value.type==='link'?'link':'fileText'} size={20}/></span>}
        <span className="nm">{value.name||value.value}</span>
        <button className="rm" type="button" onClick={()=>{ onChange(null); setLink(''); }} aria-label="Remove"><Ic name="x" size={15}/></button>
      </div>
    ) : type==='link' ? (
      <div style={{display:'flex',gap:8}}>
        <input className="input" placeholder="https://your-work.com/case-study" value={link} onChange={e=>setLink(e.target.value)}/>
        <button className="btn btn-secondary btn-sm" type="button" disabled={!link.trim()} onClick={()=>onChange({type:'link',value:link.trim(),name:link.trim()})}>Attach</button>
      </div>
    ) : (
      <>
        <div className="drop" onClick={()=>fileRef.current&&fileRef.current.click()}>
          <Ic name={type==='image'?'image':'upload'} size={22}/>
          <div style={{fontWeight:600,color:'var(--ink-2)'}}>{type==='image'?'Add an image':'Attach a file'}</div>
          <div style={{fontSize:13}}>Click to choose - others can open or download it</div>
        </div>
        <input ref={fileRef} type="file" accept={type==='image'?'image/*':undefined} style={{display:'none'}} onChange={onFile}/>
      </>
    )}
  </div>);
}

/* ---------- VALIDATOR (2 grouped question screens) ---------- */
function Validator({ subject, project, onVerify, go }){
  const [stage,setStage]=useState('intro'); // intro | 1 | 2 | stamp | done
  const [a,setA]=useState({ capacity:'', dates:'', contrib:'', outcome:'' });
  const [text,setText]=useState(''); const [again,setAgain]=useState('');
  const [vName,setVName]=useState(project?project.verifier.name:''); const [vLink,setVLink]=useState(project&&project.verifier.linkedin?project.verifier.linkedin:'');
  const set=(k,v)=>setA(s=>({...s,[k]:v}));
  const first = subject ? (subject.name||'they').split(' ')[0] : 'they';

  if(!project){
    return (<div className="screen"><div className="wrap wrap-sm vintro">
      <span className="empty ic"><Ic name="shield" size={26}/></span>
      <h1 className="h1" style={{fontSize:'clamp(24px,3vw,34px)'}}>Nothing to verify yet</h1>
      <p className="lede" style={{maxWidth:'34ch'}}>This is the screen a validator sees after you invite them. Add a project and send a request to preview it with your real details.</p>
      <button className="btn btn-primary pill" onClick={()=>go('#/add')}>Add a project</button>
    </div></div>);
  }

  if(stage==='intro'){
    return (<div className="screen"><div className="wrap wrap-sm vintro">
      <span className="eyebrow">Verification request</span>
      <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Avatar name={project.verifier.name} size={54}/>
        <span style={{margin:'0 -8px',zIndex:1}}><CheckDot size={26}/></span>
        <Avatar name={subject.name} src={subject.photo} size={54}/>
      </div>
      <h1 className="h1" style={{fontSize:'clamp(24px,3vw,36px)'}}>{first} asked you to verify their work.</h1>
      <p className="lede" style={{maxWidth:'36ch'}}>You're confirming a project at <b style={{color:'var(--black)'}}>{project.company}</b>. About 90 seconds - no account needed.</p>
      <div className="card card-pad" style={{textAlign:'left',width:'100%',maxWidth:440}}>
        <div className="lblf" style={{fontSize:11,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--grey)',marginBottom:8}}>The project</div>
        <div style={{fontWeight:700,fontSize:17,marginBottom:4}}>{project.title}</div>
        <div className="lblf muted" style={{fontSize:12.5}}>{project.company} · {periodLabel(project.startYear,project.endYear)}</div>
        {project.verifier.note && <p style={{margin:'14px 0 0',fontSize:14,color:'var(--ink-2)',lineHeight:1.5}}>“{project.verifier.note}”</p>}
        {project.artifact && <div style={{marginTop:14}}><ArtifactView a={project.artifact} small/></div>}
      </div>
      <button className="btn btn-primary pill btn-lg" style={{minWidth:220}} onClick={()=>setStage(1)}>Start verifying</button>
    </div></div>);
  }

  if(stage==='stamp'||stage==='done'){
    return (<div className="screen"><div className="wrap wrap-sm vintro" style={{minHeight:'60vh',justifyContent:'center'}}>
      <Stamp size={108}/>
      <h1 className="h1" style={{fontSize:'clamp(24px,3vw,34px)'}}>Endorsement published.</h1>
      <p className="lede" style={{maxWidth:'32ch'}}>Thanks - your verification of {first}'s work is now part of their record.</p>
      {stage==='done' && <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
        <button className="btn btn-secondary" onClick={()=>go('#/profile')}>See the profile</button>
        <button className="btn btn-ghost" onClick={()=>{setStage('intro');setA({capacity:'',dates:'',contrib:'',outcome:''});setText('');setAgain('');}}>Run it again</button>
      </div>}
    </div></div>);
  }

  const submit=()=>{
    onVerify({ contrib:a.contrib||project.contrib, quote:text.trim(), again,
      verifierName:vName.trim(), verifierLinkedin:vLink.trim(),
      capacity:a.capacity, dates:a.dates, outcome:a.outcome });
    setStage('stamp'); setTimeout(()=>setStage('done'),1900);
  };

  return (<div className="screen"><div className="wrap wrap-sm" style={{paddingTop:'clamp(24px,4vw,40px)',paddingBottom:48}}>
    <WizBar current={stage} total={2} label={stage===1?'Confirm the basics':'The outcome & your endorsement'} onBack={()=>setStage(stage===2?1:'intro')}/>
    {stage===1 && (<div style={{display:'flex',flexDirection:'column',gap:24}}>
      <QGroup label={'Did '+first+' work with you in this capacity?'} value={a.capacity}
        options={[{v:'yes',l:'Yes'},{v:'partial',l:'Partially'},{v:'no',l:'No'}]} onChange={v=>set('capacity',v)}/>
      <QGroup label="Were the dates roughly accurate?" value={a.dates}
        options={[{v:'yes',l:'Yes'},{v:'roughly',l:'Roughly'},{v:'no',l:'No'}]} onChange={v=>set('dates',v)}/>
      <div className="qgroup"><div className="q-lbl">How would you describe their contribution?</div>
        <div className="opts">{CONTRIB_DEF.map(c=>(
          <Opt key={c.key} icon={c.icon} label={c.label} sub={c.sub} sel={a.contrib===c.key} onClick={()=>set('contrib',c.key)}/>))}</div></div>
      <button className="btn btn-primary block" disabled={!a.capacity||!a.dates||!a.contrib} onClick={()=>setStage(2)}>Continue</button>
    </div>)}
    {stage===2 && (<div style={{display:'flex',flexDirection:'column',gap:22}}>
      <div><p className="muted" style={{marginBottom:10}}>{first} described the outcome as:</p>
        <div className="quotebox"><span className="qm">&ldquo;</span><p>{project.outcome}</p></div></div>
      <QGroup label="Does this reflect what you saw?" value={a.outcome}
        options={[{v:'yes',l:'Yes'},{v:'roughly',l:'Roughly'},{v:'cant',l:"Can't confirm"}]} onChange={v=>set('outcome',v)}/>
      <div className="field"><label className="field-lbl">In your own words - what should someone hiring {first} know?</label>
        <textarea className="textarea" value={text} maxLength={100} onChange={e=>setText(e.target.value)} placeholder="The person I'd want on the hardest problem in the room…"/>
        <span className="helper">Max 100 characters · {100-text.length} left</span></div>
      <QGroup label={'Would you work with '+first+' again?'} value={again}
        options={[{v:'Yes',l:'Yes'},{v:'Depends',l:'Depends'},{v:'No',l:'No'}]} onChange={setAgain}/>
      <div className="row2">
        <div className="field"><label className="field-lbl">Your name</label>
          <input className="input" value={vName} onChange={e=>setVName(e.target.value)} placeholder="Shown publicly"/></div>
        <div className="field"><label className="field-lbl">Your LinkedIn <span style={{textTransform:'none',letterSpacing:0,color:'var(--green)'}}>· builds trust</span></label>
          <input className="input" value={vLink} onChange={e=>setVLink(e.target.value)} placeholder="linkedin.com/in/…"/></div>
      </div>
      <p className="helper" style={{margin:0}}>Your name appears on {first}'s public badge - verifications are never anonymous.</p>
      <button className="btn btn-primary block" disabled={!a.outcome||!text.trim()||!again||!vName.trim()} onClick={submit}>Submit endorsement</button>
    </div>)}
  </div></div>);
}

/* ---------- PROFILE ---------- */
function WorkCard({ p, open, onToggle }){
  const v=p.status==='verified';
  return (<div className={'xcard'+(open?' open':'')}>
    <button className="xcard-head" onClick={onToggle} aria-expanded={open}>
      <div className="x-main">
        <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:6}}>
          <h3 className="h3" style={{fontSize:18}}>{p.title}</h3>
          <span className={'status '+p.status}>{v&&<CheckDot size={13}/>}{p.status[0].toUpperCase()+p.status.slice(1)}</span>
        </div>
        <span className="lblf muted" style={{fontSize:12.5}}>{p.company} · {periodLabel(p.startYear,p.endYear)}</span>
        {v && <p style={{margin:'12px 0 0',fontSize:15,lineHeight:1.5,color:'var(--ink-2)'}}><span style={{color:'var(--green)',fontWeight:600}}>Outcome confirmed</span> - {p.outcome}.</p>}
      </div>
      <span className="contrib">{v&&<CheckDot size={14}/>}{p.contrib}</span>
      <span className="xcard-toggle"><Ic name="chevronDown" size={14} stroke={2.4}/></span>
    </button>
    <div className="xcard-more"><div className="xcard-more-inner">
      <div style={{padding:'0 clamp(16px,2.2vw,24px) clamp(18px,2.2vw,24px)',display:'flex',flexDirection:'column',gap:16}}>
        {p.description && <p style={{margin:0,fontSize:15,lineHeight:1.6,color:'var(--ink-2)'}}>{p.description}</p>}
        {v ? (<>
          <div className="quotebox"><span className="qm">&ldquo;</span><p>{p.endorsement.quote}</p></div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
            <span style={{display:'inline-flex',alignItems:'center',gap:8,fontSize:14,fontWeight:500,color:'var(--ink-2)'}}>
              <CheckDot size={15}/> {p.endorsement.verifierName}{p.verifier.role?', '+p.verifier.role:''}
              {p.endorsement.again&&<span className="muted"> · would work again: <b style={{color:'var(--green)'}}>{p.endorsement.again}</b></span>}</span>
            {p.endorsement.verifierLinkedin && <a className="tlink" href={'https://'+p.endorsement.verifierLinkedin.replace(/^https?:\/\//,'')} target="_blank" rel="noopener">LinkedIn <Ic name="arrowUpRight" size={14}/></a>}
          </div>
        </>) : <div className="callout"><Ic name="info" size={18}/><p>Awaiting verification from <b>{p.verifier.name}</b>. Honest until confirmed.</p></div>}
        {p.artifact && <div><div className="field-lbl" style={{marginBottom:8}}>Artifact</div><ArtifactView a={p.artifact}/></div>}
      </div>
    </div></div>
  </div>);
}
function Profile({ user, projects, setUser, go, onDelete }){
  const [open,setOpen]=useState(projects[0]?projects[0].id:null);
  const [edit,setEdit]=useState(false);
  const [draft,setDraft]=useState(user);
  useEffect(()=>{ setDraft(user); },[user]);
  const verified=projects.filter(p=>p.status==='verified');
  const onF=k=>e=>setDraft(d=>({...d,[k]:e.target.value}));
  const empty=projects.length===0;
  return (<div className="screen"><div className="wrap wrap-lg" style={{paddingTop:'clamp(28px,5vw,52px)',paddingBottom:24}}>
    <Reveal><div className="pf-head">
      <Avatar name={user.name} src={user.photo} size={92}/>
      <div className="pf-id">
        {edit ? (<div style={{display:'flex',flexDirection:'column',gap:10,maxWidth:460}}>
          <input className="input" value={draft.name} onChange={onF('name')} placeholder="Full name"/>
          <input className="input" value={draft.title} onChange={onF('title')} placeholder="What you do"/>
          <input className="input" value={draft.location} onChange={onF('location')} placeholder="Location"/>
        </div>) : (<>
          <h1 className="pf-name">{user.name||'Your name'}</h1>
          <p className="pf-role">{user.title||'Your title'}</p>
          <div className="pf-meta">{user.location&&<span className="it"><Ic name="mapPin" size={15}/>{user.location}</span>}
            <span className="it lblf">verified.work/{user.handle}</span></div>
        </>)}
      </div>
      <div className="pf-actions">
        {edit ? (<><button className="btn btn-secondary btn-sm" onClick={()=>{setDraft(user);setEdit(false);}}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={()=>{setUser(draft);setEdit(false);}}>Save</button></>)
          : (<><button className="btn btn-secondary btn-icon" aria-label="Share"><Ic name="share" size={16}/></button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setEdit(true)}><Ic name="edit" size={15}/> Edit</button></>)}
      </div>
    </div></Reveal>
    {edit ? <textarea className="textarea" style={{marginTop:16,maxWidth:680}} value={draft.bio||''} onChange={onF('bio')} placeholder="A short bio"/>
      : user.bio && <p className="pf-bio">{user.bio}</p>}

    <Reveal><div className="pf-stats">
      <div className="stat"><div className="num">{projects.length}</div><div className="lbl">Projects</div></div>
      <div className="stat"><div className="num" style={{color:'var(--green)'}}><CheckDot size={22}/>{verified.length}</div><div className="lbl">Verified</div></div>
      <div className="stat"><div className="num">{verified.length}</div><div className="lbl">Endorsements</div></div>
      <div className="stat"><div className="num">{verified.length?Math.round(verified.filter(p=>p.endorsement.again==='Yes').length/verified.length*100)+'%':'-'}</div><div className="lbl">Would work again</div></div>
    </div></Reveal>

    {empty ? (
      <div className="empty card"><span className="ic"><Ic name="sparkle" size={26}/></span>
        <div><h2 className="h3" style={{marginBottom:8}}>Your profile is empty</h2>
          <p className="lede" style={{maxWidth:'40ch'}}>Add your first project and get it verified - it'll appear here for anyone with your link.</p></div>
        <button className="btn btn-primary pill" style={{maxWidth:240}} onClick={()=>go('#/add')}><Ic name="plus" size={18} color="#fff"/> Add a project</button>
      </div>
    ) : (<>
      {verified.length>0 && <Reveal><div style={{marginBottom:26}}>
        <div className="sec-head"><span className="eyebrow">Contribution</span><span className="ln"/></div>
        <div className="badges">{[...new Set(verified.map(p=>p.contrib))].map(c=><span key={c} className="contrib"><CheckDot size={15}/>{c}</span>)}</div>
      </div></Reveal>}
      <div className="sec-head"><span className="eyebrow">Verified work</span><span className="n">{projects.length}</span><span className="ln"/></div>
      <div className="stack">{projects.map((p,i)=>(
        <Reveal key={p.id} delay={i*70}><WorkCard p={p} open={open===p.id} onToggle={()=>setOpen(o=>o===p.id?null:p.id)}/></Reveal>))}</div>
      {verified.length>0 && (<>
        <div className="sec-head" style={{marginTop:34}}><span className="eyebrow">What people say</span><span className="ln"/></div>
        <div className="endorse">{verified.map((p,i)=>(
          <Reveal key={p.id} delay={i*80}><div className="card card-pad" style={{height:'100%',display:'flex',flexDirection:'column',gap:14}}>
            <Ic name="sparkle" size={20} color="var(--line-strong)"/>
            <p style={{margin:0,fontSize:16,lineHeight:1.5,fontWeight:500}}>{p.endorsement.quote}</p>
            <div style={{marginTop:'auto',display:'flex',alignItems:'center',gap:10}}>
              <Avatar name={p.endorsement.verifierName} size={34}/>
              <span style={{fontSize:13.5}}><b>{p.endorsement.verifierName}</b><span className="muted"> · {p.verifier.role}, {p.company}</span></span></div>
          </div></Reveal>))}</div>
      </>)}
    </>)}

    <div className="danger-zone">
      <div><div className="t">Delete account</div><div className="s">Permanently removes your profile and every work entry. This can't be undone.</div></div>
      <button className="btn btn-danger btn-sm" onClick={onDelete}><Ic name="trash" size={15}/> Delete account</button>
    </div>
  </div></div>);
}

function DeleteModal({ onCancel, onConfirm }){
  return (<div className="modal-back" onClick={onCancel}><div className="cmodal" onClick={e=>e.stopPropagation()} role="dialog" aria-modal="true">
    <div className="ic"><Ic name="trash" size={22}/></div>
    <h2 className="h3" style={{marginBottom:8}}>Delete your account?</h2>
    <p className="lede" style={{fontSize:15,marginBottom:20}}>This permanently removes your profile, all work entries, and every verification. This action can't be undone.</p>
    <div style={{display:'flex',gap:10,justifyContent:'flex-end',flexWrap:'wrap'}}>
      <button className="btn btn-secondary btn-sm" onClick={onCancel}>Cancel</button>
      <button className="btn btn-sm" style={{background:'var(--danger)',color:'#fff'}} onClick={onConfirm}>Delete everything</button>
    </div>
  </div></div>);
}

/* ---------- ROOT ---------- */
function getRoute(){ return (location.hash||'#/auth').replace(/^#/,''); }

function App(){
  const pendingRef=useRef(undefined);
  if(pendingRef.current===undefined) pendingRef.current=readPending();
  const pending=pendingRef.current;

  const [route,setRoute]=useState(getRoute());
  const [authed,setAuthed]=useState(!!pending);
  const [signupName,setSignupName]=useState(pending?pending.name:'');
  const [user,setUser]=useState({ name:'', title:'', location:'', handle:'', photo:null, bio:'', email: pending?pending.email:'' });
  const [projects,setProjects]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [connecting,setConnecting]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(false);

  useEffect(()=>{
    const onHash=()=>{ setRoute(getRoute()); window.scrollTo(0,0); };
    window.addEventListener('hashchange',onHash);
    if(pending){ try{ localStorage.removeItem('vw_pending'); }catch(_){} }
    else if(!location.hash) location.hash='#/auth';
    return ()=>window.removeEventListener('hashchange',onHash);
  },[]);

  const go=useCallback(to=>{ location.hash=to; },[]);

  const onGoogle=()=>{ setConnecting(true); setTimeout(()=>{ setConnecting(false); setAuthed(true); go('#/onboarding'); },1300); };
  const onEmail=(e)=>{ setUser(u=>({...u,email:e})); setAuthed(true); go('#/onboarding'); };
  const finishOnboarding=(u)=>{ setUser(prev=>({...prev,...u})); go('#/dashboard'); };
  const addProject=(f)=>{
    const id=Date.now();
    const proj={ id, title:f.title.trim(), company:f.company.trim(), startYear:f.startYear, endYear:f.endYear,
      contrib:f.contrib, description:f.description.trim(), outcome:f.outcome.trim(), artifact:f.artifact,
      verifier:{ name:f.vName.trim(), rel:f.vRel, role:f.vRole.trim(), email:f.vEmail.trim(), linkedin:f.vLink.trim(), note:f.vNote.trim() },
      status:'pending', endorsement:null };
    setProjects(ps=>[proj,...ps]); setActiveId(id); go('#/sent');
  };
  const verifyActive=(end)=>{
    setProjects(ps=>ps.map(p=>p.id===activeId?{...p, status:'verified', contrib:end.contrib,
      verifier:{...p.verifier, role:end.contrib?p.verifier.role:p.verifier.role, linkedin:end.verifierLinkedin||p.verifier.linkedin},
      endorsement:{ quote:end.quote, again:end.again, verifierName:end.verifierName, verifierLinkedin:end.verifierLinkedin,
        capacity:end.capacity, dates:end.dates, outcome:end.outcome }}:p));
  };
  const wipe=()=>{ try{ localStorage.removeItem('vw_pending'); }catch(_){}; window.location.href='index.html'; };

  const guarded=['/onboarding','/dashboard','/add','/sent','/profile'];
  const activeProject = projects.find(p=>p.id===activeId) || projects.find(p=>p.status==='pending') || projects[0] || null;

  let screen;
  if(guarded.indexOf('/'+route.replace(/^\//,''))>=0 && !authed){
    screen=<AuthScreen onGoogle={onGoogle} onEmail={onEmail}/>;
  } else {
    switch(route){
      case '/auth':       screen=<AuthScreen onGoogle={onGoogle} onEmail={onEmail}/>; break;
      case '/onboarding': screen=<Onboarding signupName={signupName} onDone={finishOnboarding}/>; break;
      case '/dashboard':  screen=<Dashboard user={user} projects={projects} go={go}/>; break;
      case '/add':        screen=<AddProject selfEmail={user.email} onCancel={()=>go('#/dashboard')} onSubmit={addProject}/>; break;
      case '/sent':       screen=<Sent project={activeProject} go={go}/>; break;
      case '/validate':   screen=<Validator subject={user} project={activeProject} onVerify={verifyActive} go={go}/>; break;
      case '/profile':    screen=<Profile user={user} projects={projects} setUser={setUser} go={go} onDelete={()=>setConfirmDelete(true)}/>; break;
      default:            screen=<AuthScreen onGoogle={onGoogle} onEmail={onEmail}/>;
    }
  }
  const showFoot=['/dashboard','/profile','/validate'].indexOf(route)>=0;

  return (<div className="app">
    <TopNav route={route} go={go} authed={authed} onSignout={()=>{setAuthed(false);go('#/auth');}} onDelete={()=>setConfirmDelete(true)}/>
    <div className="app-main"><div className="screen" key={route}>{screen}</div></div>
    {showFoot && <footer className="app-foot"><div className="inner">
      <span>© 2026 verified.work - human validation in an AI world.</span>
      <span style={{display:'inline-flex',gap:16}}><a href="index.html">Landing</a><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a></span>
    </div></footer>}
    {connecting && <GoogleConnecting/>}
    {confirmDelete && <DeleteModal onCancel={()=>setConfirmDelete(false)} onConfirm={wipe}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
