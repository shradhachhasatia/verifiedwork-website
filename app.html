<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>verified.work — the app</title>
<meta name="description" content="Your verified professional profile — endorsed by the people who'd know. Human validation in an AI world.">
<link rel="icon" href="/favicon.ico" sizes="32x32">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Tokens — inherited from the verified.work landing page
   ============================================================ */
:root{
  --green:#2D6A4F; --green-2:#40916C; --green-tint:#D8F3DC; --green-deep:#1F4A37;
  --green-ring:rgba(45,106,79,.22);
  --black:#1A1A1A; --white:#FFFFFF;
  --grey:#6B7280; --grey-2:#9CA3AF; --grey-3:#4B5563;
  --ink-2:#374151;
  --line:#E5E7EB; --line-strong:#D1D5DB; --line-faint:#F3F4F6;
  --surface-2:#F9FAFB; --surface-3:#F3F4F6;
  --warning:#B5800B; --warning-tint:#FEF3C7;
  --danger:#B91C1C; --danger-tint:#FEE2E2;

  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;

  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --ease-stamp:cubic-bezier(0.2,1.3,0.4,1);

  --fs-eyebrow:clamp(10px,0.7vw + 8px,13px);
  --fs-body:clamp(15px,0.3vw + 13px,17px);
  --fs-lede:clamp(16px,0.7vw + 13px,20px);
  --fs-h3:clamp(19px,0.9vw + 15px,25px);
  --fs-h2:clamp(26px,2vw + 16px,42px);
  --fs-h1:clamp(32px,3.4vw + 16px,56px);

  --nav-h:64px;
  --shadow-sm:0 1px 2px rgba(17,24,39,.05);
  --shadow-md:0 18px 40px -16px rgba(26,26,26,.18);
  --shadow-lg:0 26px 52px -16px rgba(26,26,26,.28);
}

*,*::before,*::after{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0; font-family:var(--font); font-size:var(--fs-body); line-height:1.5;
  color:var(--black); background:var(--white);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
img,svg{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
::selection{background:var(--green-tint);color:var(--green-deep);}
a{color:inherit;}

/* ============================================================
   App shell
   ============================================================ */
#root{min-height:100vh;}
.app{min-height:100vh;display:flex;flex-direction:column;}

.app-nav{
  position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);
  background:rgba(255,255,255,.82);
  backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid transparent;transition:border-color 200ms var(--ease-out);
}
.app-nav.scrolled{border-color:var(--line);}
.app-nav .inner{
  height:100%;max-width:1180px;margin:0 auto;padding:0 clamp(18px,3vw,40px);
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.wm{display:inline-flex;align-items:center;text-decoration:none;color:var(--black);
  font-weight:700;font-size:clamp(16px,0.5vw + 14px,19px);letter-spacing:-.015em;line-height:1;}
.wm .work{font-weight:400;color:var(--grey);}
.wm .check{display:inline-flex;align-items:center;justify-content:center;width:12px;height:12px;
  border-radius:50%;background:var(--green);margin:0 2px;flex-shrink:0;}
.wm .check svg{width:8px;height:8px;}

.nav-actions{display:inline-flex;align-items:center;gap:10px;position:relative;}
.nav-menu-btn{width:38px;height:38px;border-radius:50%;background:transparent;border:1px solid var(--line);
  display:inline-flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:0;
  transition:background 150ms,border-color 150ms;}
.nav-menu-btn:hover{background:var(--surface-2);border-color:var(--grey-2);}
.nav-menu-btn span{display:block;width:16px;height:2px;background:var(--black);border-radius:2px;
  transition:transform 220ms var(--ease-out),opacity 180ms;}
.nav-menu-btn.open span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.nav-menu-btn.open span:nth-child(2){opacity:0;}
.nav-menu-btn.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
.nav-menu{position:absolute;top:calc(100% + 12px);right:0;min-width:232px;background:var(--white);
  border:1px solid var(--line);border-radius:14px;padding:6px;box-shadow:var(--shadow-md);
  opacity:0;transform:translateY(-8px) scale(.96);transform-origin:top right;
  transition:opacity 180ms var(--ease-out),transform 220ms var(--ease-out);pointer-events:none;z-index:110;}
.nav-menu.open{opacity:1;transform:none;pointer-events:auto;}
.nav-menu .mi{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 12px;border:0;
  background:transparent;border-radius:9px;font-size:14px;font-weight:500;color:var(--black);text-decoration:none;
  transition:background 150ms,color 150ms;}
.nav-menu .mi:hover{background:var(--surface-2);color:var(--green);}
.nav-menu .mi.active{color:var(--green);background:var(--green-tint);}
.nav-menu .mi svg{width:16px;height:16px;color:var(--grey);flex-shrink:0;}
.nav-menu .mi:hover svg,.nav-menu .mi.active svg{color:var(--green);}
.nav-menu .sep{height:1px;background:var(--line);margin:6px 8px;}
.nav-menu .mlabel{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--grey-2);padding:8px 12px 4px;}

.app-main{flex:1;padding-top:var(--nav-h);display:flex;flex-direction:column;}
.screen{flex:1;width:100%;animation:scr-in .42s var(--ease-out) both;}
@keyframes scr-in{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){.screen{animation:none;}}

.wrap{width:100%;margin:0 auto;padding-left:clamp(20px,4vw,40px);padding-right:clamp(20px,4vw,40px);}
.wrap-sm{max-width:520px;}
.wrap-md{max-width:760px;}
.wrap-lg{max-width:1040px;}

/* ============================================================
   Type helpers
   ============================================================ */
.eyebrow{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--green);}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--green);}
.mono{font-family:var(--mono);letter-spacing:.01em;}
.h1{font-weight:700;font-size:var(--fs-h1);line-height:1.06;letter-spacing:-.03em;margin:0;text-wrap:balance;}
.h2{font-weight:700;font-size:var(--fs-h2);line-height:1.1;letter-spacing:-.025em;margin:0;text-wrap:balance;}
.h3{font-weight:700;font-size:var(--fs-h3);line-height:1.2;letter-spacing:-.02em;margin:0;}
.lede{font-size:var(--fs-lede);color:var(--grey);line-height:1.55;margin:0;}
.muted{color:var(--grey);}

/* ============================================================
   Buttons — black pill primary (green on hover), green = verification only
   ============================================================ */
.btn{appearance:none;border:1px solid transparent;border-radius:12px;font-weight:600;font-size:15px;
  letter-spacing:-.005em;display:inline-flex;align-items:center;justify-content:center;gap:8px;
  min-height:50px;padding:0 22px;transition:background 150ms,border-color 150ms,color 150ms,transform 80ms,box-shadow 150ms;}
.btn:active{transform:scale(.985);}
.btn.block{width:100%;}
.btn.pill{border-radius:999px;}
.btn-primary{background:var(--black);color:var(--white);}
.btn-primary:hover{background:var(--green);}
.btn-primary:disabled{background:var(--grey-2);cursor:not-allowed;}
.btn-secondary{background:var(--white);color:var(--black);border-color:var(--line-strong);}
.btn-secondary:hover{border-color:var(--black);}
.btn-ghost{background:transparent;color:var(--grey-3);min-height:44px;}
.btn-ghost:hover{color:var(--black);}
.btn-sm{min-height:40px;padding:0 16px;font-size:14px;border-radius:10px;}
.btn-google{background:var(--white);color:#3c4043;border:1px solid var(--line-strong);font-weight:600;}
.btn-google:hover{background:var(--surface-2);border-color:var(--grey-2);box-shadow:var(--shadow-sm);}
.btn-icon{width:42px;height:42px;min-height:42px;padding:0;border-radius:11px;flex-shrink:0;}

.divider-or{display:flex;align-items:center;gap:14px;color:var(--grey-2);font-size:13px;}
.divider-or::before,.divider-or::after{content:"";flex:1;height:1px;background:var(--line);}

/* ============================================================
   Forms
   ============================================================ */
.field{display:flex;flex-direction:column;gap:8px;}
.field-lbl{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--grey);}
.input,.textarea{width:100%;background:var(--white);border:1px solid var(--line-strong);border-radius:12px;
  padding:14px 16px;font-size:16px;color:var(--black);outline:none;transition:border-color .16s,box-shadow .16s;}
.input{min-height:52px;}
.textarea{min-height:120px;resize:none;line-height:1.5;}
.input::placeholder,.textarea::placeholder{color:var(--grey-2);}
.input:focus,.textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-ring);}
.input.err{border-color:var(--danger);}
.field-err{font-family:var(--mono);font-size:12px;color:var(--danger);}

.pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{appearance:none;flex:1;min-width:84px;background:var(--white);border:1px solid var(--line-strong);
  border-radius:10px;padding:11px 12px;font-weight:600;font-size:14px;color:var(--black);min-height:46px;
  transition:border-color .16s,background .16s,color .16s;}
.pill:hover{border-color:var(--black);}
.pill.sel{background:var(--green);border-color:var(--green);color:#fff;}

/* ============================================================
   Cards + expandable
   ============================================================ */
.card{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);}
.card-pad{padding:clamp(18px,2.4vw,24px);}

.xcard{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);
  overflow:hidden;transition:border-color .2s var(--ease-out),box-shadow .2s var(--ease-out);}
.xcard:hover{box-shadow:var(--shadow-md);}
.xcard.open{border-color:var(--green);}
.xcard-head{display:flex;align-items:flex-start;gap:14px;padding:clamp(16px,2.2vw,22px);cursor:pointer;
  text-align:left;width:100%;background:transparent;border:0;}
.xcard-head .x-main{flex:1;min-width:0;}
.xcard-toggle{width:30px;height:30px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);
  color:var(--grey-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
  transition:transform .34s var(--ease-out),background .2s,color .2s,border-color .2s;}
.xcard-toggle svg{width:14px;height:14px;}
.xcard.open .xcard-toggle{transform:rotate(180deg);background:var(--green);color:#fff;border-color:var(--green);}
.xcard-more{display:grid;grid-template-rows:0fr;transition:grid-template-rows .44s var(--ease-out);}
.xcard.open .xcard-more{grid-template-rows:1fr;}
.xcard-more-inner{overflow:hidden;}

.status{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:500;
  letter-spacing:.03em;padding:5px 10px;border-radius:999px;}
.status.verified{background:var(--green-tint);color:#1F4A37;}
.status.pending{background:var(--warning-tint);color:#7A5708;}
.status.draft{background:var(--surface-3);color:var(--grey-3);}
.contrib{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:var(--black);
  background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 10px;}

.receipt-row{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:10px 0;
  border-top:1px solid var(--line);}
.receipt-row .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);}
.receipt-row .v{font-size:14px;font-weight:600;text-align:right;}

.quotebox{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;position:relative;}
.quotebox .qm{position:absolute;top:8px;left:14px;font-size:36px;line-height:1;color:var(--line-strong);font-family:Georgia,serif;}
.quotebox p{margin:0;padding-left:24px;font-size:16px;line-height:1.5;font-weight:500;color:var(--black);}

.tlink{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:600;font-size:14px;
  text-decoration:none;}
.tlink svg{width:14px;height:14px;transition:transform .2s var(--ease-out);}
.tlink:hover svg{transform:translate(3px,-3px);}

.callout{background:var(--green-tint);border-radius:14px;padding:16px 18px;display:flex;gap:12px;align-items:flex-start;}
.callout svg{color:var(--green);flex-shrink:0;margin-top:2px;width:18px;height:18px;}
.callout p{margin:0;font-size:14px;line-height:1.5;color:#23503D;}
.callout p b{color:#1B3E2E;}

/* avatar */
.avi{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:600;
  flex-shrink:0;overflow:hidden;background:var(--black);}
.check-dot{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--green);flex-shrink:0;}

/* ============================================================
   Auth screen
   ============================================================ */
.auth{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;
  padding:clamp(32px,6vw,72px) 20px;text-align:center;min-height:calc(100vh - var(--nav-h));}
.auth-icon{width:clamp(64px,9vw,88px);height:clamp(64px,9vw,88px);margin:0 auto 22px;
  opacity:0;transform:scale(.7);animation:stamp-in 800ms var(--ease-stamp) 120ms forwards;}
.auth-icon svg{width:100%;height:100%;overflow:visible;}
.auth-icon .vp,.auth-icon .wp{fill:none;stroke-width:14;stroke-linecap:round;stroke-linejoin:miter;stroke-miterlimit:6;
  stroke-dasharray:600;stroke-dashoffset:600;animation:draw 900ms var(--ease-out) 420ms forwards;}
.auth-icon .vp{stroke:var(--black);}
.auth-icon .wp{stroke:var(--green-2);animation-delay:620ms;}
.auth h1{font-weight:700;font-size:clamp(28px,3vw + 14px,42px);line-height:1.08;letter-spacing:-.03em;margin:0 0 14px;
  display:flex;flex-direction:column;gap:2px;align-items:center;
  opacity:0;transform:translateY(14px);animation:rise 700ms var(--ease-out) 600ms forwards;}
.auth .cyc{display:inline-block;position:relative;overflow:hidden;height:1.12em;color:var(--green);vertical-align:bottom;}
.auth .cyc-w{display:inline-block;transition:transform .42s var(--ease-out),opacity .3s,filter .38s;}
.auth .cyc-w.out{transform:translateY(-100%);opacity:0;filter:blur(6px);}
.auth-sub{max-width:34ch;margin:0 auto;color:var(--grey);font-size:var(--fs-lede);
  opacity:0;transform:translateY(12px);animation:rise 700ms var(--ease-out) 800ms forwards;}
.auth-card{width:100%;max-width:400px;margin:clamp(28px,3vw,40px) auto 0;display:flex;flex-direction:column;gap:14px;
  opacity:0;transform:translateY(12px);animation:rise 700ms var(--ease-out) 1000ms forwards;}
.auth-legal{font-size:12px;color:var(--grey-2);max-width:36ch;margin:18px auto 0;line-height:1.5;
  opacity:0;animation:rise 700ms var(--ease-out) 1200ms forwards;}
.auth-legal a{color:var(--grey);text-decoration:underline;text-underline-offset:2px;}

/* Google chooser modal */
.modal-back{position:fixed;inset:0;z-index:300;background:rgba(17,24,39,.42);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s ease both;}
.gmodal{width:100%;max-width:400px;background:#fff;border-radius:18px;overflow:hidden;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.5);animation:pop .34s var(--ease-stamp) both;text-align:left;}
.gmodal-hd{padding:22px 24px 16px;border-bottom:1px solid var(--line);}
.gmodal-hd .g-logo{margin-bottom:14px;}
.gmodal-hd h3{margin:0 0 4px;font-size:20px;font-weight:500;color:#202124;letter-spacing:-.01em;}
.gmodal-hd p{margin:0;font-size:13px;color:#5f6368;}
.gmodal-hd p b{font-weight:600;color:#202124;}
.gacct{display:flex;align-items:center;gap:14px;width:100%;background:transparent;border:0;text-align:left;
  padding:14px 24px;transition:background 150ms;}
.gacct:hover{background:var(--surface-2);}
.gacct .avi{width:36px;height:36px;font-size:14px;}
.gacct .ga-name{font-size:14px;font-weight:600;color:#202124;}
.gacct .ga-mail{font-size:13px;color:#5f6368;}
.gacct.other{color:#5f6368;font-size:14px;border-top:1px solid var(--line);}
.gacct.other .ga-ic{width:36px;height:36px;border-radius:50%;border:1px solid var(--line-strong);
  display:flex;align-items:center;justify-content:center;color:#5f6368;}
.gmodal-ft{padding:14px 24px 18px;font-size:11px;color:#5f6368;line-height:1.5;}
.gspin{display:flex;flex-direction:column;align-items:center;gap:18px;padding:48px 24px;text-align:center;}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--green);
  animation:spin .8s linear infinite;}

/* ============================================================
   Dashboard
   ============================================================ */
.dash-hd{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:28px;}
.complete{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:26px;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.complete .bar{flex:1;min-width:160px;height:8px;border-radius:999px;background:var(--surface-3);overflow:hidden;}
.complete .bar i{display:block;height:100%;background:var(--green);border-radius:999px;transition:width 900ms var(--ease-out);}
.sec-head{display:flex;align-items:center;gap:12px;margin:0 0 16px;}
.sec-head .n{font-family:var(--mono);font-size:12px;color:var(--grey-2);}
.sec-head .ln{flex:1;height:1px;background:var(--line);}
.stack{display:flex;flex-direction:column;gap:14px;}

/* ============================================================
   Profile
   ============================================================ */
.pf-head{display:flex;gap:clamp(18px,3vw,30px);align-items:flex-start;flex-wrap:wrap;margin-bottom:8px;}
.pf-id{flex:1;min-width:240px;}
.pf-name{font-weight:700;font-size:clamp(26px,2.4vw + 16px,40px);letter-spacing:-.03em;line-height:1.05;margin:0 0 6px;}
.pf-role{font-size:var(--fs-lede);color:var(--ink-2);margin:0 0 8px;}
.pf-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;color:var(--grey);font-size:14px;}
.pf-meta .it{display:inline-flex;align-items:center;gap:6px;}
.pf-meta .it svg{width:15px;height:15px;}
.pf-bio{margin:16px 0 0;font-size:var(--fs-body);color:var(--ink-2);line-height:1.6;max-width:62ch;}
.pf-actions{display:flex;gap:10px;flex-shrink:0;}
.pf-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:26px 0;}
@media (min-width:640px){.pf-stats{grid-template-columns:repeat(4,1fr);}}
.stat{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
.stat .num{font-weight:800;font-size:clamp(24px,2vw + 14px,32px);letter-spacing:-.02em;line-height:1;
  display:inline-flex;align-items:center;gap:7px;}
.stat .lbl{margin-top:7px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--grey);}
.badges{display:flex;gap:10px;flex-wrap:wrap;}
.endorse{display:grid;gap:14px;}
@media (min-width:720px){.endorse{grid-template-columns:1fr 1fr;}}

/* ============================================================
   Validator standalone flow
   ============================================================ */
.vintro{display:flex;flex-direction:column;align-items:center;text-align:center;gap:22px;
  padding:clamp(28px,5vw,56px) 0;}
.prog{display:flex;align-items:center;gap:14px;}
.prog .dots{display:flex;gap:7px;}
.prog .dots i{width:8px;height:8px;border-radius:50%;background:var(--line-strong);transition:background .2s,transform .2s;}
.prog .dots i.on{background:var(--green);}
.prog .lbl{font-family:var(--mono);font-size:12px;color:var(--grey);}
.opts{display:flex;flex-direction:column;gap:12px;}
.opt{appearance:none;width:100%;text-align:left;background:var(--white);border:1px solid var(--line-strong);
  border-radius:14px;padding:18px;min-height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  color:var(--black);transition:border-color .16s,background .16s,box-shadow .16s,transform .08s;}
.opt:hover{border-color:var(--black);}
.opt:active{transform:scale(.99);}
.opt .o-row{display:flex;align-items:center;gap:14px;flex:1;}
.opt .o-ic{width:40px;height:40px;border-radius:11px;background:var(--surface-3);display:flex;align-items:center;
  justify-content:center;color:var(--grey-3);flex-shrink:0;transition:background .16s,color .16s;}
.opt .o-label{font-weight:600;font-size:16px;}
.opt .o-sub{font-size:13px;color:var(--grey);margin-top:3px;}
.opt .o-tick{opacity:0;transform:scale(.6);transition:opacity .16s,transform .2s;color:#fff;}
.opt.sel{background:var(--green);border-color:var(--green);box-shadow:0 8px 22px -8px rgba(45,106,79,.5);}
.opt.sel .o-label{color:#fff;}
.opt.sel .o-sub{color:rgba(255,255,255,.82);}
.opt.sel .o-ic{background:rgba(255,255,255,.16);color:#fff;}
.opt.sel .o-tick{opacity:1;transform:scale(1);}

.stamp-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.stamp-svg{animation:stamp-pop .42s var(--ease-stamp) both;}
.stamp-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--green);opacity:0;
  animation:stamp-ring .6s ease-out .1s both;}

/* ============================================================
   Reveal on scroll
   ============================================================ */
.reveal{opacity:0;transform:translateY(28px);transition:opacity 700ms var(--ease-out),transform 700ms var(--ease-out);}
.reveal.in{opacity:1;transform:none;}

/* ============================================================
   Footer
   ============================================================ */
.app-foot{border-top:1px solid var(--line);background:var(--surface-2);margin-top:48px;}
.app-foot .inner{max-width:1040px;margin:0 auto;padding:26px clamp(20px,4vw,40px);
  display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  font-size:13px;color:var(--grey);}
.app-foot a{color:var(--grey);text-decoration:none;font-weight:500;}
.app-foot a:hover{color:var(--green);}

/* ============================================================
   Animations
   ============================================================ */
@keyframes rise{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
@keyframes stamp-in{0%{opacity:0;transform:scale(.65);}60%{opacity:1;transform:scale(1.05);}100%{opacity:1;transform:scale(1);}}
@keyframes stamp-pop{0%{transform:scale(.6);opacity:0;}60%{transform:scale(1.08);opacity:1;}100%{transform:scale(1);}}
@keyframes stamp-ring{0%{transform:scale(.7);opacity:.5;}100%{transform:scale(1.6);opacity:0;}}
@keyframes draw{to{stroke-dashoffset:0;}}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
@keyframes pop{from{opacity:0;transform:scale(.92) translateY(10px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes sk{0%{background-position:100% 0;}100%{background-position:0 0;}}
.sk{background:linear-gradient(90deg,var(--surface-3) 25%,#ECEEF1 37%,var(--surface-3) 63%);
  background-size:400% 100%;border-radius:8px;animation:sk 1.4s ease infinite;}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important;}
  .reveal{opacity:1;transform:none;}
}

/* Reveal-on-scroll wrapper */
function Reveal({ children, className = '', delay = 0, style }) {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((es) => {
      es.forEach(e => { if (e.isIntersecting) { setSeen(true); io.unobserve(e.target); } });
    }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return (
    <div ref={ref} className={'reveal ' + (seen ? 'in ' : '') + className}
         style={{ transitionDelay: (seen ? delay : 0) + 'ms', ...style }}>
      {children}
    </div>
  );
}

function TopNav({ route, go, authed, onSignout }) {
  const [open, setOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const wrapRef = useRef(null);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    window.addEventListener('scroll', onScroll, { passive:true }); onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  useEffect(() => {
    const onDoc = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('click', onDoc); document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('click', onDoc); document.removeEventListener('keydown', onKey); };
  }, []);
  useEffect(() => { setOpen(false); }, [route]);

  return (
    <nav className={'app-nav' + (scrolled ? ' scrolled' : '')}>
      <div className="inner">
        <a className="wm" href="index.html" aria-label="verified.work — home"><Wordmark/></a>

function Stamp({ size = 104 }) {
  return (
    <div className="stamp-wrap" style={{width:size,height:size}}>
      <span className="stamp-ring"/>
      <svg className="stamp-svg" width={size} height={size} viewBox="0 0 96 96">
        <circle cx="48" cy="48" r="48" fill="var(--green)"/>
        <polyline points="29 49 42 62 67 34" fill="none" stroke="#fff" strokeWidth="7" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

const SUBJECT = { name:'Frank Docent', project:'brand identity redesign', company:'Studio Nord',
  claim:'Increased client retention by 40% in six months' };

function Validator({ go }) {
  const [stage, setStage] = useState('intro'); // intro | 1..4 | stamp | done
  const [ans, setAns] = useState({});
  const [text, setText] = useState('');
  const [again, setAgain] = useState(null);
  const first = SUBJECT.name.split(' ')[0];
  const topRef = useRef(null);
  const set = (k,v) => setAns(a=>({...a,[k]:v}));
  const pick = (k,v) => { set(k,v); setTimeout(()=>adv(), 240); };
  const adv = () => { setStage(s => (typeof s==='number'? s+1 : 1)); if(topRef.current) topRef.current.scrollIntoView({behavior:'smooth',block:'start'}); };
  const back = () => setStage(s => (s>1? s-1 : 'intro'));
  const submit = () => { setStage('stamp'); setTimeout(()=>setStage('done'), 1900); };

  if (stage === 'intro') {
    return (
      <div className="screen"><div className="wrap wrap-sm vintro">
        <span className="eyebrow">Verification request</span>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
          <Avatar name="Jordan M." size={56}/>
          <span style={{margin:'0 -8px',zIndex:1}}><CheckDot size={26}/></span>
          <Avatar name={SUBJECT.name} size={56}/>
        </div>
        <h1 className="h1" style={{fontSize:'clamp(26px,3vw,38px)'}}>{first} asked you to verify his work.</h1>
        <p className="lede" style={{maxWidth:'34ch'}}>
          You're confirming a project you worked on together at <b style={{color:'var(--black)'}}>{SUBJECT.company}</b>.
          It takes about two minutes. No account needed.
        </p>
        <div className="card card-pad" style={{textAlign:'left',width:'100%',maxWidth:420}}>
          <div className="mono" style={{fontSize:11,letterSpacing:'.06em',textTransform:'uppercase',color:'var(--grey)',marginBottom:8}}>The project</div>
          <div style={{fontWeight:700,fontSize:17,marginBottom:4}}>{SUBJECT.project}</div>
          <div className="mono muted" style={{fontSize:12.5}}>{SUBJECT.company} · 2024</div>
        </div>
        <button className="btn btn-primary pill" style={{minWidth:200}} onClick={adv}>Start verifying</button>
      </div></div>
    );
  }

  if (stage === 'stamp' || stage === 'done') {
    return (
      <div className="screen"><div className="wrap wrap-sm vintro" style={{minHeight:'60vh',justifyContent:'center'}}>
        <Stamp size={108}/>
        <h1 className="h1" style={{fontSize:'clamp(26px,3vw,36px)'}}>Endorsement published.</h1>
        <p className="lede" style={{maxWidth:'32ch'}}>Thanks — your verification of {first}'s work is now part of his record.</p>
        {stage === 'done' && (
          <div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
            <button className="btn btn-secondary" onClick={()=>go('#/profile')}>See his profile</button>
            <button className="btn btn-ghost" onClick={()=>{setStage('intro');setAns({});setText('');setAgain(null);}}>Run it again</button>
          </div>
        )}
      </div></div>
    );
  }

  const step = stage;
  return (
    <div className="screen"><div className="wrap wrap-sm" style={{paddingTop:'clamp(24px,4vw,40px)',paddingBottom:48}} ref={topRef}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
        <div className="prog"><div className="dots">{[1,2,3,4].map(i=><i key={i} className={i<=step?'on':''}/>)}</div>
          <span className="lbl">{step} of 4</span></div>
        <button className="btn btn-ghost btn-sm" onClick={back}><Ic name="arrowLeft" size={15}/> Back</button>
      </div>

      {step===1 && (<div style={{display:'flex',flexDirection:'column',gap:22}}>
        <h2 className="h2" style={{fontSize:'clamp(21px,2vw,27px)'}}>{first} says you worked together on the <b>{SUBJECT.project}</b> at {SUBJECT.company}. Is that right?</h2>
        <div className="opts">
          <Opt label="Yes, I can speak to his work" sel={ans.rel==='yes'} onClick={()=>pick('rel','yes')}/>
          <Opt label="We were peers" sel={ans.rel==='peer'} onClick={()=>pick('rel','peer')}/>
          <Opt label="I'm not the right person" sel={ans.rel==='no'} onClick={()=>pick('rel','no')}/>
        </div>
      </div>)}

      {step===2 && (<div style={{display:'flex',flexDirection:'column',gap:22}}>
        <h2 className="h2" style={{fontSize:'clamp(21px,2vw,27px)'}}>What was {first}'s involvement?</h2>
        <div className="opts">{CONTRIB_DEF.map(c=>(
          <Opt key={c.key} icon={c.icon} label={c.label} sub={c.sub} sel={ans.contrib===c.key} onClick={()=>pick('contrib',c.key)}/>
        ))}</div>
      </div>)}

      {step===3 && (<div style={{display:'flex',flexDirection:'column',gap:20}}>
        <p className="muted">{first} described the outcome as:</p>
        <div className="quotebox"><span className="qm">&ldquo;</span><p>{SUBJECT.claim}</p></div>
        <h2 className="h2" style={{fontSize:'clamp(20px,2vw,25px)'}}>Does this reflect what you saw?</h2>
        <div className="opts">
          <Opt label="Yes, that's accurate" sel={ans.out==='acc'} onClick={()=>pick('out','acc')}/>
          <Opt label="Roughly right" sel={ans.out==='rough'} onClick={()=>pick('out','rough')}/>
          <Opt label="Can't confirm this" sel={ans.out==='cant'} onClick={()=>pick('out','cant')}/>
        </div>
      </div>)}

      {step===4 && (<div style={{display:'flex',flexDirection:'column',gap:20}}>
        <h2 className="h2" style={{fontSize:'clamp(21px,2vw,27px)'}}>In your own words — what should someone hiring {first} know?</h2>
        <div className="field">
          <textarea className="textarea" value={text} maxLength={280} onChange={e=>setText(e.target.value)}
            placeholder="He's the person I'd want on the hardest problem in the room…"/>
          <span className="muted" style={{fontSize:13}}>One sentence is enough.</span>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <span className="field-lbl">Would you work with him again?</span>
          <div className="pills">{['Yes','Depends','No'].map(p=>(
            <button key={p} className={'pill'+(again===p?' sel':'')} onClick={()=>setAgain(p)}>{p}</button>
          ))}</div>
        </div>
        <button className="btn btn-primary block" disabled={!text.trim()} onClick={submit}>Submit endorsement</button>
      </div>)}
    </div></div>
  );
}

function Opt({ label, sub, icon, sel, onClick }) {
  return (
    <button className={'opt' + (sel?' sel':'')} onClick={onClick}>
      <div className="o-row">
        {icon && <span className="o-ic"><Ic name={icon} size={20}/></span>}
        <span><span className="o-label" style={{display:'block'}}>{label}</span>{sub && <span className="o-sub" style={{display:'block'}}>{sub}</span>}</span>
      </div>
      <span className="o-tick"><Ic name="check" size={20} color="#fff" stroke={2.4}/></span>
    </button>
  );
}

/* ============================================================
   ROOT — hash router
   ============================================================ */
function getRoute() { return (location.hash || '#/auth').replace(/^#/, ''); }

function App() {
  const [route, setRoute] = useState(getRoute());
  const [authed, setAuthed] = useState(false);
  const [user, setUser] = useState(SEED_USER);
  const [projects, setProjects] = useState(SEED_PROJECTS);
  const [email, setEmail] = useState('frank@docent.co');
  const [validatorEmail, setValidatorEmail] = useState('jordan@studionord.co');
  const [gmodal, setGmodal] = useState(false);

  useEffect(() => {
    const onHash = () => { setRoute(getRoute()); window.scrollTo(0,0); };
    window.addEventListener('hashchange', onHash);
    if (!location.hash) location.hash = '#/auth';
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const go = useCallback((to) => { location.hash = to; }, []);

  // Routes that require auth fall back to /auth
  const guarded = ['/dashboard','/add','/invite','/profile','/sent','/onboarding'];
  useEffect(() => {
    if (!authed && guarded.includes(route)) go('#/auth');
  }, [route, authed]);

  const onGoogle = () => { setUser(SEED_USER); setAuthed(true); setGmodal(false); go('#/dashboard'); };
  const onEmail = (e) => { setEmail(e); setAuthed(true); go('#/link-sent'); };

  let screen;
  switch (route) {
    case '/auth':      screen = <AuthScreen onGoogle={()=>setGmodal(true)} onEmail={onEmail}/>; break;
    case '/link-sent': screen = <LinkSent email={email} onContinue={()=>go('#/onboarding')}/>; break;
    case '/onboarding':screen = <Onboarding user={{name:'',role:''}} onDone={(u)=>{setUser({...SEED_USER,...u});go('#/dashboard');}}/>; break;
    case '/dashboard': screen = <Dashboard user={user} projects={projects} go={go}/>; break;
    case '/add':       screen = <AddWork go={go} onAdd={()=>go('#/invite')}/>; break;
    case '/invite':    screen = <Invite go={go} onSent={(e)=>{setValidatorEmail(e);go('#/sent');}}/>; break;
    case '/sent':      screen = <Sent email={validatorEmail} go={go}/>; break;
    case '/validate':  screen = <Validator go={go}/>; break;
    case '/profile':   screen = <Profile user={user} projects={projects} setUser={setUser} go={go}/>; break;
    default:           screen = <AuthScreen onGoogle={()=>setGmodal(true)} onEmail={onEmail}/>;
  }

  const showFoot = ['/dashboard','/profile','/validate'].includes(route);

  return (
    <div className="app">
      <TopNav route={route} go={go} authed={authed} onSignout={()=>{setAuthed(false);go('#/auth');}}/>
      <div className="app-main">
        <div className="screen" key={route}>{screen}</div>
      </div>
      {showFoot && (
        <footer className="app-foot"><div className="inner">
          <span>© 2026 verified.work — human validation in an AI world.</span>
          <span style={{display:'inline-flex',gap:16}}>
            <a href="index.html">Landing</a><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a>
          </span>
        </div></footer>
      )}
      {gmodal && <GoogleModal onPick={onGoogle} onClose={()=>setGmodal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
